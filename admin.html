<title>Admin | Blattner</title>
<style>
  :root{
    --dark-blue:#02568A; --energy-blue:#2DA2DB; --light-blue:#B9E5FB;
    --bright-gray:#F2F2F2; --light-gray:#BCBCBC; --medium-gray:#76777B;
    --dark-gray:#333333; --white:#FFFFFF; --black:#000000;
    --r:14px; --r-sm:10px; --r-lg:20px;
    --shadow:0 1px 4px #BCBCBC; --shadow-lift:0 10px 24px #BCBCBC;
    --rail-w:88px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{overflow-x:hidden;}
  body{font-family:Arial, Helvetica, sans-serif;color:var(--dark-gray);background:var(--bright-gray);
    line-height:1.5;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
  h1,h2,h3{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;color:var(--dark-blue);line-height:1.05;}
  a{color:var(--energy-blue);}

  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  @keyframes railIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:none;}}

  /* ---------- App shell ---------- */
  .app-shell{display:flex;min-height:100vh;align-items:stretch;}
  .nav-rail{flex:0 0 var(--rail-w);width:var(--rail-w);background:var(--dark-blue);color:var(--white);
    display:flex;flex-direction:column;align-items:stretch;padding:16px 8px 14px;position:sticky;top:0;height:100vh;
    animation:railIn .3s ease both;}
  .rail-logo{display:block;width:46px;height:46px;margin:0 auto 22px;}
  .rail-logo svg{width:100%;height:100%;display:block;}
  .rail-item{display:block;text-align:center;color:var(--light-blue);text-decoration:none;padding:12px 4px;
    border-radius:var(--r-sm);margin-bottom:6px;transition:background .18s ease,color .18s ease,transform .18s ease;}
  .rail-item:hover{background:var(--energy-blue);color:var(--white);transform:translateY(-2px);}
  .rail-item.active{background:var(--white);color:var(--dark-blue);}
  .rail-ic{width:20px;height:20px;margin:0 auto 7px;position:relative;display:block;}
  .ic-hub::before{content:"";position:absolute;left:0;top:0;width:8px;height:8px;border-radius:2px;background:currentColor;
    box-shadow:12px 0 0 currentColor,0 12px 0 currentColor,12px 12px 0 currentColor;}
  .ic-assets::before{content:"";position:absolute;left:0;top:2px;width:20px;height:3px;border-radius:2px;background:currentColor;
    box-shadow:0 7px 0 currentColor,0 14px 0 currentColor;}
  .ic-deliv::before{content:"";box-sizing:border-box;position:absolute;left:1px;top:1px;width:18px;height:18px;border:2px solid currentColor;border-radius:3px;}
  .ic-deliv::after{content:"";box-sizing:border-box;position:absolute;left:6px;top:5px;width:6px;height:10px;border:2px solid currentColor;
    border-top:none;border-left:none;transform:rotate(45deg);}
  .ic-admin::before{content:"";box-sizing:border-box;position:absolute;left:5px;top:1px;width:10px;height:8px;border:2px solid currentColor;border-bottom:none;border-radius:5px 5px 0 0;}
  .ic-admin::after{content:"";box-sizing:border-box;position:absolute;left:3px;top:8px;width:14px;height:11px;background:currentColor;border-radius:2px;}
  .rail-lbl{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:9px;letter-spacing:0.04em;display:block;}
  .rail-foot{margin-top:auto;text-align:center;font-family:'Arial Black', Arial, sans-serif;font-size:10px;
    letter-spacing:0.12em;color:var(--energy-blue);padding-top:12px;}

  .app-body{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;}

  /* ---------- Top bar ---------- */
  .topbar{background:var(--dark-blue);color:var(--white);padding:20px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .topbar h1{color:var(--white);font-size:22px;letter-spacing:0.01em;}
  .topbar .tb-sub{font-size:11px;text-transform:uppercase;letter-spacing:0.10em;color:var(--light-blue);font-weight:bold;margin-top:3px;}
  .topbar .spacer{flex:1;}
  .topbar .who{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--light-blue);font-weight:bold;
    border:1px solid var(--energy-blue);border-radius:999px;padding:7px 14px;display:none;}
  .topbar .who.show{display:inline-block;}

  main{max-width:1160px;width:100%;margin:0 auto;padding:32px 32px 56px;}
  .intro{margin-bottom:22px;animation:fadeUp .4s ease both;}
  .intro h2{font-size:24px;margin-bottom:6px;}
  .intro .rule{width:64px;height:4px;background:var(--energy-blue);margin:10px 0 14px;border-radius:2px;}
  .intro p{color:var(--medium-gray);max-width:640px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px;}
  .card{background:var(--white);border:1px solid var(--light-gray);border-radius:var(--r);overflow:hidden;
    display:flex;flex-direction:column;min-height:210px;box-shadow:var(--shadow);
    transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;animation:fadeUp .5s ease both;}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lift);border-color:var(--energy-blue);}
  .card .accent-top{height:5px;background:var(--energy-blue);}
  .card .body{padding:22px 22px 8px;flex:1;}
  .card .chip{width:44px;height:44px;border-radius:12px;background:var(--light-blue);position:relative;margin-bottom:14px;}
  .card .chip::before{content:"";position:absolute;left:12px;top:14px;width:20px;height:3px;border-radius:2px;background:var(--dark-blue);
    box-shadow:0 6px 0 var(--dark-blue),0 12px 0 var(--dark-blue);}
  .card.proc .chip::before{content:"";box-sizing:border-box;left:12px;top:12px;width:20px;height:20px;border:3px solid var(--dark-blue);border-radius:4px;background:none;box-shadow:none;}
  .card.proc .chip::after{content:"";box-sizing:border-box;position:absolute;left:18px;top:16px;width:7px;height:12px;border:3px solid var(--dark-blue);
    border-top:none;border-left:none;transform:rotate(45deg);}
  .card.lock .accent-top{background:var(--dark-blue);}
  .card.lock .chip::before{content:"";box-sizing:border-box;position:absolute;left:14px;top:10px;width:16px;height:13px;
    border:3px solid var(--dark-blue);border-bottom:none;border-radius:8px 8px 0 0;background:none;box-shadow:none;}
  .card.lock .chip::after{content:"";box-sizing:border-box;position:absolute;left:11px;top:19px;width:22px;height:16px;
    background:var(--dark-blue);border-radius:3px;box-shadow:none;}
  .card .eyebrow{font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:0.10em;color:var(--medium-gray);margin-bottom:6px;}
  .card h3{font-size:19px;color:var(--dark-blue);margin-bottom:10px;}
  .card p{font-size:14px;color:var(--medium-gray);}
  .card .foot{padding:14px 22px 22px;}
  .open-btn{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:12px;letter-spacing:0.04em;
    padding:11px 20px;border:1px solid var(--dark-blue);background:var(--dark-blue);color:var(--white);border-radius:var(--r-sm);
    text-decoration:none;display:inline-flex;align-items:center;gap:8px;cursor:pointer;transition:background .18s ease,border-color .18s ease,gap .18s ease;}
  .open-btn::after{content:"\2192";}
  .open-btn:hover{background:var(--energy-blue);border-color:var(--energy-blue);gap:12px;}
  .linkbtn{background:none;border:none;font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;
    font-size:11px;letter-spacing:0.04em;color:var(--medium-gray);cursor:pointer;padding:11px 8px;}
  .linkbtn:hover{color:var(--dark-blue);}

  /* Open requests card */
  .reqcard{background:var(--white);border:1px solid var(--light-gray);border-radius:var(--r);overflow:hidden;
    box-shadow:var(--shadow);margin-top:24px;animation:fadeUp .5s ease both;}
  .reqcard .card-head{background:var(--dark-blue);padding:14px 20px;display:flex;align-items:center;gap:12px;}
  .reqcard .card-head h3{color:var(--white);font-size:15px;}
  .reqcard .card-head .rq-refresh{margin-left:auto;background:none;border:1px solid var(--energy-blue);color:var(--light-blue);
    font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:10px;letter-spacing:0.04em;
    border-radius:999px;padding:6px 12px;cursor:pointer;}
  .reqcard .card-head .rq-refresh:hover{background:var(--energy-blue);color:var(--white);}
  .reqrow{display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px;padding:13px 20px;border-bottom:1px solid var(--bright-gray);font-size:13px;}
  .reqrow:last-child{border-bottom:none;}
  .reqrow .rq-main{flex:1;min-width:0;}
  .rq-remove{background:none;border:1px solid var(--light-gray);color:var(--medium-gray);
    font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:10px;letter-spacing:0.04em;
    border-radius:999px;padding:6px 12px;cursor:pointer;transition:background .18s ease,color .18s ease,border-color .18s ease;}
  .rq-remove:hover{background:var(--dark-blue);border-color:var(--dark-blue);color:var(--white);}
  .reqrow .rq-main strong{color:var(--dark-blue);}
  .badge{display:inline-block;background:var(--bright-gray);border:1px solid var(--light-gray);color:var(--dark-blue);
    border-radius:999px;font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:0.04em;padding:3px 10px;white-space:nowrap;}
  .badge.issue{color:var(--medium-gray);}
  .muted{color:var(--medium-gray);font-size:12px;}
  .rq-empty{padding:20px;color:var(--medium-gray);font-size:13px;}

  footer{max-width:1160px;width:100%;margin:0 auto;padding:0 32px 40px;color:var(--medium-gray);font-size:11px;}

  @media (max-width:820px){
    :root{--rail-w:100%;}
    .app-shell{flex-direction:column;}
    .nav-rail{flex-direction:row;height:auto;position:static;padding:8px;align-items:center;gap:6px;}
    .rail-logo{margin:0 8px 0 4px;width:38px;height:38px;flex:0 0 38px;}
    .rail-item{flex:1;margin-bottom:0;padding:8px 4px;}
    .rail-ic{width:18px;height:18px;margin:0 auto 4px;}
    .rail-foot{display:none;}
  }
  @media (max-width:560px){
    .topbar{padding:16px 16px;} main{padding:22px 16px 48px;} footer{padding:0 16px 32px;}
    .topbar h1{font-size:18px;}
  }
</style>
</head>

<script>
"use strict";
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const $ = s => document.querySelector(s);

/* The Cloudflare Worker that gates admin writes (team-access management lives here). */
const WORKER_URL = "https://asset-portal.site-asset-manager.workers.dev";
const wbase = () => WORKER_URL.replace(/\/$/,"");

/* Admin sign-in shares localStorage with inventory.html + deliveries.html (same origin). */
function adminKey(){ return localStorage.getItem("bac_admin_key")||""; }
function adminName(){ return localStorage.getItem("bac_admin_name")||""; }
function adminHeaders(){ return {"Content-Type":"application/json","x-admin-key":adminKey(),"x-admin-name":adminName()}; }
async function adminSignIn(){
  const n=prompt("Your name (shown on updates):"); if(n===null) return;
  const k=prompt("Admin key:"); if(k===null) return;
  const name=n.trim()||"admin", key=k.trim();
  if(!key){ alert("Enter your admin key."); return; }
  // Validate against the Worker (master key or a repo-listed admin) before storing.
  try{
    const r=await fetch(wbase()+"/admin/verify",{method:"POST",
      headers:{"Content-Type":"application/json","x-admin-key":key,"x-admin-name":name}});
    const d=await r.json().catch(()=>({}));
    if(!d.ok){ alert("That admin key wasn't recognized. Check the key (or ask an admin to add you under Team access)."); return; }
    localStorage.setItem("bac_admin_name", d.name||name);   // canonical name from the list
    localStorage.setItem("bac_admin_key", key);
  }catch(e){
    alert("Couldn't reach the sign-in service. Check your connection and try again."); return;
  }
  renderAdmin();
}
function adminSignOut(){ localStorage.removeItem("bac_admin_key"); renderAdmin(); }

/* ---------- Team access (repo-based admin list; no Cloudflare needed) ---------- */
function newAdminKey(){   // 32 hex chars of CSPRNG entropy — copy/paste friendly, no ambiguous chars
  const a=new Uint8Array(16); crypto.getRandomValues(a);
  return [...a].map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function loadTeam(){
  const w=$("#teamWrap"); if(!w) return;
  w.innerHTML='<div class="reqcard"><div class="card-head"><h3>Team access</h3></div><div class="rq-empty">Loading…</div></div>';
  let admins=[];
  try{
    const r=await fetch(wbase()+"/admins",{headers:adminHeaders()});
    if(!r.ok) throw new Error(r.status===401?"not authorized":("HTTP "+r.status));
    admins=(await r.json()).admins||[];
  }catch(e){
    w.innerHTML='<div class="reqcard"><div class="card-head"><h3>Team access</h3><button class="rq-refresh" id="teamRetry">Retry</button></div>'+
      '<div class="rq-empty">Couldn\'t load the admin list ('+esc(e.message)+').</div></div>';
    return;
  }
  renderTeam(admins);
}
function renderTeam(admins){
  const rows = admins.length ? admins.map(a=>
    '<div class="reqrow"><span class="rq-main"><strong>'+esc(a.name)+'</strong>'+
      (a.added?' <span class="muted">added '+esc(a.added)+'</span>':'')+'</span>'+
      '<button class="rq-remove" data-remove="'+esc(a.name)+'">Remove</button></div>'
  ).join("") : '<div class="rq-empty">No additional admins yet — the master key is the only access. Add teammates so they can sign in with their own key.</div>';
  $("#teamWrap").innerHTML =
    '<div class="reqcard"><div class="card-head"><h3>Team access'+(admins.length?(' ('+admins.length+')'):'')+'</h3>'+
      '<button class="rq-refresh" id="addAdminBtn">+ Add admin</button></div>'+
      '<div class="reqrow"><span class="rq-main"><strong>Master key</strong> <span class="muted">always works · set in Cloudflare</span></span></div>'+
      rows+
      '<div class="rq-empty" style="border-top:1px solid var(--bright-gray)">Adding a teammate generates a key you give them once — they enter it on the Admin tab. Remove anyone here to revoke their access instantly.</div>'+
    '</div>';
}
async function addAdmin(){
  const n=prompt("New admin's name:"); if(n===null) return;
  const name=n.trim(); if(!name){ alert("Enter a name."); return; }
  const key=newAdminKey();
  try{
    const r=await fetch(wbase()+"/admins",{method:"POST",headers:adminHeaders(),
      body:JSON.stringify({action:"add",name,key})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok||!d.ok){ alert("Couldn't add admin: "+esc((d&&d.error)||("HTTP "+r.status))); return; }
    // Show the generated key ONCE — it's only stored hashed, so it can't be recovered.
    window.prompt("Give this key to "+name+" — it won't be shown again.\nThey enter it on the Admin tab to sign in.\n\nCopy it now:", key);
    loadTeam();
  }catch(e){ alert("Couldn't reach the service. Try again."); }
}
async function removeAdmin(name){
  if(!window.confirm("Remove "+name+"? Their key stops working immediately.")) return;
  try{
    const r=await fetch(wbase()+"/admins",{method:"POST",headers:adminHeaders(),
      body:JSON.stringify({action:"remove",name})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok||!d.ok){ alert("Couldn't remove admin: "+esc((d&&d.error)||("HTTP "+r.status))); return; }
    loadTeam();
  }catch(e){ alert("Couldn't reach the service. Try again."); }
}

/* ---------- Open change requests (read-only, from the public GitHub Issues API) ---------- */
const GH_ISSUES = "https://api.github.com/repos/be-apps-tools/1127/issues?state=open&per_page=100";
function labelsOf(it){ return (it.labels||[]).map(l => typeof l==="string" ? l : (l&&l.name)||""); }
function parseMarker(body){ const m=/```json\s*({[\s\S]*?})\s*```/.exec(body||""); if(!m) return null; try{ return JSON.parse(m[1]); }catch(e){ return null; } }
function field(body,label){ const m=new RegExp("\\*\\*"+label+":\\*\\*\\s*(.*)").exec(body||""); return m?m[1].trim():""; }
async function fetchOpenIssues(){
  const r=await fetch(GH_ISSUES,{headers:{"Accept":"application/vnd.github+json"}});
  if(!r.ok) throw new Error("GitHub "+r.status);
  const a=await r.json();
  return Array.isArray(a)?a.filter(it=>!it.pull_request):[];
}
async function loadOpenRequests(){
  const w=$("#openReqsWrap");
  w.innerHTML='<div class="reqcard"><div class="card-head"><h3>Open change requests</h3></div><div class="rq-empty">Loading…</div></div>';
  let reqs;
  try{
    const arr=await fetchOpenIssues();
    reqs=arr.filter(it=>{ const L=labelsOf(it); return L.includes("request:reassign")||L.includes("request:issue"); })
      .map(it=>{ const L=labelsOf(it), m=parseMarker(it.body)||{};
        const type=L.includes("request:reassign")?"reassign":"issue";
        return { number:it.number, type,
          unit:m.unit||field(it.body,"Unit"), serial:m.serial||field(it.body,"Serial"),
          site:m.site||field(it.body,"Site"), requestedTrade:m.requestedTrade||field(it.body,"Requested trade"),
          current:field(it.body,"Current trade"), requester:field(it.body,"Requester") };
      });
  }catch(e){
    w.innerHTML='<div class="reqcard"><div class="card-head"><h3>Open change requests</h3><button class="rq-refresh" id="rqRefresh">Retry</button></div><div class="rq-empty">Could not load requests ('+esc(e.message)+'). GitHub may be rate-limiting — try again shortly.</div></div>';
    return;
  }
  renderOpenReqs(reqs);
}
function renderOpenReqs(reqs){
  const rows = reqs.length ? reqs.map(r=>{
    const badge = r.type==="reassign" ? '<span class="badge">Reassign</span>' : '<span class="badge issue">Issue</span>';
    const change = r.type==="reassign" ? (esc(r.current||"(none)")+' &rarr; '+esc(r.requestedTrade||"?")) : 'Reported issue';
    const meta = [r.site, r.requester].filter(Boolean).map(esc).join(' &middot; ');
    return '<div class="reqrow">'+badge+
      '<span class="rq-main"><strong>Unit '+esc(r.unit||"?")+'</strong> <span class="muted">SN '+esc(r.serial||"—")+'</span> &middot; '+change+'</span>'+
      (meta?'<span class="muted">'+meta+'</span>':'')+
      '</div>';
  }).join("") : '<div class="rq-empty">No open change requests. Nothing to action right now.</div>';
  $("#openReqsWrap").innerHTML =
    '<div class="reqcard"><div class="card-head"><h3>Open change requests'+(reqs.length?(' ('+reqs.length+')'):'')+'</h3>'+
      '<button class="rq-refresh" id="rqRefresh">Refresh</button></div>'+rows+'</div>';
}

function renderAdmin(){
  const z=$("#adminZone"), who=$("#who");
  if(adminKey()){
    who.textContent = "Signed in" + (adminName()?(" · "+adminName()):""); who.classList.add("show");
    z.innerHTML =
      '<div class="card"><div class="accent-top"></div>' +
        '<div class="body"><div class="chip" aria-hidden="true"></div>' +
          '<div class="eyebrow">Inventory</div><h3>Equipment Master</h3>' +
          '<p>Upload the latest Equipment Master .xlsx and publish updated inventory — parsed in your browser, no file upload.</p></div>' +
        '<div class="foot"><a class="open-btn" href="inventory.html?admin=import">Open importer</a></div></div>' +
      '<div class="card proc"><div class="accent-top"></div>' +
        '<div class="body"><div class="chip" aria-hidden="true"></div>' +
          '<div class="eyebrow">Procurement</div><h3>New tracker</h3>' +
          '<p>Create a delivery tracker from a Requisition .xlsx.</p></div>' +
        '<div class="foot"><a class="open-btn" href="deliveries.html?admin=new">Open tracker form</a></div></div>' +
      '<div class="card lock"><div class="accent-top"></div>' +
        '<div class="body"><div class="chip" aria-hidden="true"></div>' +
          '<div class="eyebrow">Session</div><h3>Signed in</h3>' +
          '<p>' + esc(adminName()||"admin") + ' — signed in on this device. Sign out to require the admin key again.</p></div>' +
        '<div class="foot"><button class="linkbtn" id="adminSignOut">Sign out</button></div></div>';
    loadTeam();
    loadOpenRequests();
  } else {
    who.classList.remove("show"); who.textContent="";
    $("#teamWrap").innerHTML="";
    z.innerHTML =
      '<div class="card lock"><div class="accent-top"></div>' +
        '<div class="body"><div class="chip" aria-hidden="true"></div>' +
          '<div class="eyebrow">Restricted</div><h3>Admin sign in</h3>' +
          '<p>Enter the admin key to manage Equipment Master imports and delivery trackers.</p></div>' +
        '<div class="foot"><button class="open-btn" id="adminSignIn">Sign in</button></div></div>';
    $("#openReqsWrap").innerHTML="";
  }
}
$("#adminZone").addEventListener("click", e=>{
  if(e.target.closest("#adminSignIn")) adminSignIn();
  else if(e.target.closest("#adminSignOut")) adminSignOut();
});
$("#openReqsWrap").addEventListener("click", e=>{ if(e.target.closest("#rqRefresh")) loadOpenRequests(); });
$("#teamWrap").addEventListener("click", e=>{
  if(e.target.closest("#addAdminBtn")) addAdmin();
  else if(e.target.closest("#teamRetry")) loadTeam();
  else { const rm=e.target.closest("[data-remove]"); if(rm) removeAdmin(rm.getAttribute("data-remove")); }
});
renderAdmin();
</script>
