<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Deliveries | Blattner</title>
<style>
  :root{
    --dark-blue:#02568A; --energy-blue:#2DA2DB; --light-blue:#B9E5FB;
    --bright-gray:#F2F2F2; --light-gray:#BCBCBC; --medium-gray:#76777B;
    --dark-gray:#333333; --white:#FFFFFF; --black:#000000;
    --r:14px; --r-sm:10px; --r-lg:20px;
    --shadow:0 1px 4px #BCBCBC; --shadow-lift:0 10px 24px #BCBCBC;
    --rail-w:88px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{overflow-x:hidden;}
  body{font-family:Arial, Helvetica, sans-serif;color:var(--dark-gray);background:var(--bright-gray);line-height:1.5;-webkit-text-size-adjust:100%;}
  h1,h2,h3{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;color:var(--dark-blue);line-height:1.05;}
  a{color:var(--energy-blue);}


  /* ---------- App shell ---------- */
  .app-shell{display:flex;min-height:100vh;align-items:stretch;}
  .nav-rail{flex:0 0 var(--rail-w);width:var(--rail-w);background:var(--dark-blue);color:var(--white);
    display:flex;flex-direction:column;align-items:stretch;padding:16px 8px 14px;min-height:100vh;}
  .rail-logo{display:block;width:46px;height:46px;margin:0 auto 22px;}
  .rail-logo svg{width:100%;height:100%;display:block;}
  .rail-item{display:block;text-align:center;color:var(--light-blue);text-decoration:none;padding:12px 4px;
    border-radius:var(--r-sm);margin-bottom:6px;transition:background .18s ease,color .18s ease,transform .18s ease;}
  .rail-item:hover{background:var(--energy-blue);color:var(--white);}
  .rail-item.active{background:var(--white);color:var(--dark-blue);}
  .rail-ic{width:20px;height:20px;margin:0 auto 7px;position:relative;display:block;}
  .ic-hub::before{content:"";position:absolute;left:0;top:0;width:8px;height:8px;border-radius:2px;background:currentColor;
    box-shadow:12px 0 0 currentColor,0 12px 0 currentColor,12px 12px 0 currentColor;}
  .ic-assets::before{content:"";position:absolute;left:0;top:2px;width:20px;height:3px;border-radius:2px;background:currentColor;
    box-shadow:0 7px 0 currentColor,0 14px 0 currentColor;}
  .ic-deliv::before{content:"";box-sizing:border-box;position:absolute;left:1px;top:1px;width:18px;height:18px;border:2px solid currentColor;border-radius:3px;}
  .ic-deliv::after{content:"";box-sizing:border-box;position:absolute;left:6px;top:5px;width:6px;height:10px;border:2px solid currentColor;
    border-top:none;border-left:none;transform:rotate(45deg);}
  .ic-admin::before{content:"";box-sizing:border-box;position:absolute;left:5px;top:1px;width:10px;height:8px;border:2px solid currentColor;border-bottom:none;border-radius:5px 5px 0 0;}
  .ic-admin::after{content:"";box-sizing:border-box;position:absolute;left:3px;top:8px;width:14px;height:11px;background:currentColor;border-radius:2px;}
  .ic-guide::before{content:"";box-sizing:border-box;position:absolute;left:1px;top:2px;width:18px;height:16px;border:2px solid currentColor;border-radius:2px;}
  .ic-guide::after{content:"";position:absolute;left:9px;top:2px;width:2px;height:16px;background:currentColor;}
  .rail-lbl{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:9px;letter-spacing:0.04em;display:block;}
  .rail-foot{margin-top:auto;text-align:center;font-family:'Arial Black', Arial, sans-serif;font-size:10px;
    letter-spacing:0.04em;color:var(--energy-blue);padding-top:12px;}
  .app-body{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;}

  /* ---------- Top bar ---------- */
  .topbar{background:var(--dark-blue);color:var(--white);padding:18px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .topbar .titles{min-width:0;}
  .topbar h1{color:var(--white);font-size:20px;}
  .topbar .sub{font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--light-blue);font-weight:bold;margin-top:3px;}
  .topbar .spacer{flex:1;}

  main{max-width:1400px;width:100%;margin:0 auto;padding:22px 24px 56px;}

  .adminbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .adminbar .who{font-size:12px;color:var(--medium-gray);font-weight:bold;text-transform:uppercase;letter-spacing:0.05em;}
  .banner{display:none;padding:10px 14px;font-size:12px;font-weight:bold;background:var(--light-blue);color:var(--dark-blue);border:1px solid var(--energy-blue);border-radius:var(--r-sm);margin-bottom:14px;}
  .banner.show{display:block;}

  .toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px;}
  .toolbar .search{flex:1 1 220px;min-width:0;}
  input[type=text],input[type=file],select{width:100%;font-family:Arial, Helvetica, sans-serif;font-size:16px;color:var(--dark-gray);background:var(--white);border:1px solid var(--light-gray);border-radius:var(--r-sm);padding:11px 13px;transition:border-color .15s ease,box-shadow .15s ease;}
  select{flex:0 1 auto;min-width:150px;}
  input:focus,select:focus{outline:none;border-color:var(--energy-blue);box-shadow:0 0 0 2px var(--light-blue);}
  .seg{display:inline-flex;border:1px solid var(--light-gray);border-radius:999px;overflow:hidden;}
  .seg button{background:var(--white);border:none;font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:11px;letter-spacing:0.04em;color:var(--medium-gray);padding:10px 18px;cursor:pointer;transition:background .18s ease,color .18s ease;}
  .seg button[aria-selected="true"]{background:var(--dark-blue);color:var(--white);}
  #filtersBtn.on{background:var(--dark-blue);color:var(--white);border-color:var(--dark-blue);}
  .filterbar{display:none;flex-wrap:wrap;gap:10px;align-items:center;margin:-4px 0 16px;padding:12px 14px;background:var(--white);border:1px solid var(--light-gray);border-radius:var(--r-sm);box-shadow:var(--shadow);}
  .filterbar.show{display:flex;}
  .filterbar .fgrp{display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
  .filterbar select{min-width:150px;width:auto;flex:0 1 auto;}
  .filterbar input[type=date]{width:auto;flex:0 1 auto;font-size:14px;padding:9px 11px;}
  .filterbar .flbl{font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:0.05em;color:var(--medium-gray);}
  .linkbtn{background:none;border:none;color:var(--energy-blue);font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:11px;letter-spacing:0.04em;cursor:pointer;padding:8px 6px;margin-left:auto;}
  .linkbtn:hover{color:var(--dark-blue);}

  .btn{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:12px;letter-spacing:0.04em;padding:11px 16px;border:1px solid var(--dark-blue);background:var(--dark-blue);color:var(--white);cursor:pointer;border-radius:var(--r-sm);display:inline-flex;align-items:center;gap:8px;min-height:40px;transition:background .18s ease,border-color .18s ease,transform .18s ease;}
  .btn:hover{background:var(--energy-blue);border-color:var(--energy-blue);}
  .btn.small{font-size:11px;padding:8px 11px;min-height:34px;}
  .btn.secondary{background:var(--white);color:var(--dark-blue);border-color:var(--light-gray);}
  .btn.secondary:hover{background:var(--bright-gray);border-color:var(--dark-blue);}
  .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

  .pager{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .pg-btn{background:var(--white);border:1px solid var(--light-gray);border-radius:var(--r-sm);color:var(--dark-blue);font-family:'Arial Black', Arial, sans-serif;font-size:15px;line-height:1;padding:7px 13px;cursor:pointer;min-height:34px;}
  .pg-btn:hover:not(:disabled){border-color:var(--energy-blue);}
  .pg-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .pager select{width:auto;min-width:120px;flex:0 0 auto;}
  .pg-info{font-size:11px;color:var(--medium-gray);font-weight:bold;text-transform:uppercase;letter-spacing:0.05em;}

  .card{background:var(--white);border:1px solid var(--light-gray);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
  .card-head{background:var(--dark-blue);padding:14px 18px;}
  .card-head h2{color:var(--white);font-size:15px;}
  .card-body{padding:18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:0.06em;color:var(--medium-gray);margin-bottom:6px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:520px){ .two-col{grid-template-columns:1fr;} }

  #newPanel{display:none;margin-bottom:20px;}
  #newPanel.show{display:block;}

  .table-scroll{overflow-x:auto;min-width:0;border:1px solid var(--light-gray);border-radius:var(--r-sm);background:var(--white);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{background:var(--dark-blue);color:var(--white);font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:10px;letter-spacing:0.06em;text-align:left;padding:11px 8px;white-space:nowrap;}
  tbody td{padding:9px 8px;border-bottom:1px solid var(--bright-gray);vertical-align:top;}
  tbody tr:nth-child(even){background:var(--bright-gray);}

  /* Progress meters + rings */
  .lmeter{height:5px;background:var(--bright-gray);border-radius:3px;overflow:hidden;margin-top:6px;min-width:64px;max-width:120px;}
  .lmeter>span{display:block;height:100%;background:var(--energy-blue);border-radius:3px;width:0;transition:width .8s ease;}
  .lmeter.done>span{background:var(--dark-blue);}
  .ring-wrap{position:relative;width:52px;height:52px;flex:0 0 52px;}
  .ring-wrap .ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Arial Black', Arial, sans-serif;font-size:12px;color:var(--dark-blue);}
  svg.chart.ring{width:100%;height:100%;display:block;}
  .ring-fg{transition:stroke-dashoffset 1s ease;}

  .trk{border:1px solid var(--light-gray);border-left:4px solid var(--energy-blue);border-radius:var(--r);background:var(--white);margin-bottom:14px;box-shadow:var(--shadow);transition:box-shadow .2s ease,transform .2s ease;}
  .trk:hover{box-shadow:var(--shadow-lift);}
  .trk .top{padding:14px 18px;display:flex;flex-wrap:wrap;gap:8px 16px;align-items:center;cursor:pointer;}
  .trk .req{font-family:'Arial Black', Arial, sans-serif;color:var(--dark-blue);font-size:15px;}
  .trk .meta{font-size:12px;color:var(--medium-gray);}
  .trk .meta.orig{font-weight:bold;text-transform:uppercase;font-size:10px;letter-spacing:0.04em;border:1px solid var(--light-gray);border-radius:999px;padding:3px 10px;}
  .trkTrade{width:auto;min-width:130px;flex:0 0 auto;font-size:12px;padding:6px 10px;min-height:0;}
  .trk .prog{margin-left:auto;display:flex;align-items:center;gap:14px;}
  .trk .prog .lines{font-size:12px;font-weight:bold;color:var(--dark-blue);text-align:right;white-space:nowrap;}
  .trk .detail{display:none;padding:0 18px 18px;}
  .trk.open .detail{display:block;}
  .badge{display:inline-block;background:var(--bright-gray);border:1px solid var(--light-gray);color:var(--dark-blue);border-radius:999px;font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:0.04em;padding:3px 10px;white-space:nowrap;}
  .st-none{color:var(--medium-gray);} .st-onsite{color:var(--energy-blue);} .st-partial{color:var(--energy-blue);} .st-complete{color:var(--dark-blue);}
  .rd-over{color:#EC9522;font-weight:bold;white-space:nowrap;} .rd-soon{color:var(--energy-blue);font-weight:bold;white-space:nowrap;}
  .rd-tag{display:inline-block;background:#EC9522;color:var(--white);font-size:8px;font-weight:bold;text-transform:uppercase;letter-spacing:0.04em;padding:2px 6px;border-radius:999px;vertical-align:middle;margin-left:4px;}
  .rd-tag.soon{background:var(--energy-blue);}
  .badge.over{background:#EC9522;color:var(--white);border-color:#EC9522;}
  .badge.done{background:#007200;color:var(--white);border-color:#007200;}
  .trk.done{border-left-color:#007200;}
  .trk.done .top{background:#F2F2F2;}

  /* New-tracker order preview */
  .ordsum{font-size:12px;color:var(--medium-gray);font-weight:bold;text-transform:uppercase;letter-spacing:0.05em;margin:4px 0 10px;}
  .ordrow{border:1px solid var(--light-gray);border-left:4px solid var(--light-gray);border-radius:var(--r-sm);margin-bottom:10px;}
  .ord-head{display:flex;flex-wrap:wrap;align-items:center;gap:8px 12px;padding:11px 14px;}
  .ord-head .req{font-family:'Arial Black', Arial, sans-serif;color:var(--dark-blue);font-size:14px;}
  .ord-head .meta{font-size:12px;color:var(--medium-gray);}
  .ord-view{margin-left:auto;background:none;border:1px solid var(--light-gray);border-radius:999px;font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:10px;letter-spacing:0.04em;color:var(--medium-gray);padding:6px 12px;cursor:pointer;}
  .ord-view:hover{border-color:var(--energy-blue);color:var(--dark-blue);}
  .ord-head select{min-width:150px;width:auto;flex:0 1 auto;}
  .ordrow.ready{border-left-color:var(--energy-blue);}
  .ordrow.dupe{opacity:0.6;border-left-color:var(--medium-gray);}
  .ordrow.excluded{opacity:0.55;border-left-color:var(--medium-gray);}
  .ord-ex{background:none;border:1px solid var(--light-gray);border-radius:999px;font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:10px;letter-spacing:0.04em;color:var(--medium-gray);padding:6px 12px;cursor:pointer;}
  .ord-ex:hover{border-color:var(--dark-blue);color:var(--dark-blue);}
  .ord-lines{display:none;padding:0 14px 12px;overflow-x:auto;}
  .ordrow.open .ord-lines{display:block;}
  .ord-lines table{width:100%;border-collapse:collapse;font-size:12px;}
  .ord-lines th{text-align:left;color:var(--medium-gray);text-transform:uppercase;font-size:9px;letter-spacing:0.05em;padding:5px 8px;border-bottom:1px solid var(--light-gray);white-space:nowrap;}
  .ord-lines td{padding:5px 8px;border-bottom:1px solid var(--bright-gray);vertical-align:top;}
  .ordsum .ord-view{margin-left:8px;}

  /* Per-line delivery/pickup logging */
  .logcell .ev{display:flex;flex-wrap:nowrap;gap:6px;align-items:center;margin-bottom:5px;white-space:nowrap;}
  .logcell .ev:last-child{margin-bottom:0;}
  .logcell input{padding:6px 8px;font-size:13px;flex:0 0 auto;}
  .logcell .btn{flex:0 0 auto;}
  .logcell .evlbl{font-size:9px;font-weight:bold;text-transform:uppercase;letter-spacing:0.04em;color:var(--medium-gray);width:52px;flex:0 0 52px;}
  .pickedby{font-size:11px;color:var(--medium-gray);}
  .pk{margin-bottom:4px;} .pk:last-child{margin-bottom:0;}
  .pk-edit{background:none;border:none;color:var(--energy-blue);font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:9px;letter-spacing:0.04em;cursor:pointer;padding:0 2px;}
  .pk-edit:hover{color:var(--dark-blue);}
  .pk-form{display:none;align-items:center;gap:4px;white-space:nowrap;}
  .pk.editing .pk-view{display:none;} .pk.editing .pk-form{display:inline-flex;}
  .pk-form input{width:56px;padding:4px 6px;font-size:12px;}
  .pk-save,.pk-cancel{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:9px;letter-spacing:0.04em;border-radius:var(--r-sm);padding:5px 9px;cursor:pointer;}
  .pk-save{background:var(--dark-blue);color:var(--white);border:1px solid var(--dark-blue);}
  .pk-cancel{background:var(--white);color:var(--dark-blue);border:1px solid var(--light-gray);}
  .del-line{background:none;border:none;color:var(--medium-gray);font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:9px;letter-spacing:0.04em;cursor:pointer;padding:0 2px;}
  .del-line:hover{color:var(--amber);}

  .empty{padding:44px 20px;text-align:center;color:var(--medium-gray);background:var(--white);border:1px solid var(--light-gray);border-radius:var(--r);box-shadow:var(--shadow);}
  .empty .big{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;color:var(--light-gray);font-size:18px;margin-bottom:6px;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--dark-blue);color:var(--white);padding:12px 22px;font-weight:bold;font-size:13px;text-transform:uppercase;letter-spacing:0.04em;border-radius:var(--r-sm);border-left:4px solid var(--energy-blue);display:none;z-index:60;max-width:90vw;text-align:center;box-shadow:var(--shadow-lift);}
  .toast.show{display:block;}

  @media (max-width:820px){
    :root{--rail-w:100%;}
    .app-shell{flex-direction:column;}
    .nav-rail{flex-direction:row;height:auto;min-height:0;position:static;padding:8px;align-items:center;gap:6px;}
    .rail-logo{margin:0 8px 0 4px;width:38px;height:38px;flex:0 0 38px;}
    .rail-item{flex:1;margin-bottom:0;padding:8px 4px;}
    .rail-ic{width:18px;height:18px;margin:0 auto 4px;}
    .rail-foot{display:none;}
  }
  @media (max-width:560px){ .topbar{padding:14px 16px;} main{padding:16px 16px 44px;} .topbar h1{font-size:17px;} }
  /* ---------- optional view-only access gate (admin can require a key) ---------- */
  .acc-wait .app-shell{visibility:hidden;}
  #accGate{display:none;position:fixed;inset:0;z-index:9999;background:var(--dark-blue);align-items:center;justify-content:center;padding:24px;}
  .acc-locked #accGate{display:flex;}
  .acc-locked .app-shell{display:none;}
  .acc-box{background:var(--white);border:1px solid var(--light-gray);border-radius:16px;max-width:420px;width:100%;
    padding:34px 30px;box-shadow:0 10px 24px #BCBCBC;text-align:center;}
  .acc-mark{width:52px;height:52px;border-radius:14px;background:var(--light-blue);margin:0 auto 16px;position:relative;}
  .acc-mark::before{content:"";box-sizing:border-box;position:absolute;left:17px;top:13px;width:18px;height:15px;
    border:3px solid var(--dark-blue);border-bottom:none;border-radius:9px 9px 0 0;}
  .acc-mark::after{content:"";box-sizing:border-box;position:absolute;left:13px;top:24px;width:26px;height:19px;background:var(--dark-blue);border-radius:4px;}

<script>
"use strict";
const WORKER_URL = "https://asset-portal.site-asset-manager.workers.dev";
const TRADES = ["Electrical","Civil","Install","Commissioning","SIS","Office","Maintenance","Safety","Survey","TLine"];
const CATEGORIES = ["Indirect","Incorporated","Equipment"];
const STATE = { trackers:[], state:"open", admin:false, adminName:"", pendingOrders:null, existingReqs:null, existingTrackers:null, page:1, cache:{open:null,closed:null} };
const PAGE_SIZE = 100;
const CREATE_PACE_MS = 1200;   // spacing between bulk creates (GitHub throttles rapid issue creation)
const MAX_LINES = 200;         // GitHub caps an issue body at 65,536 chars; split big orders into ≤200-line trackers

const $ = s => document.querySelector(s);
const sleep = ms => new Promise(r=>setTimeout(r, ms));
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
let toastT=null;
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),3000); }
function banner(msg){ const b=$("#banner"); if(!msg){b.classList.remove("show");return;} b.textContent=msg; b.classList.add("show"); }

/* ---------- Excel date serial → ISO ---------- */
function excelSerialToISO(v){
  const s=String(v==null?"":v).trim(); if(!s) return "";
  const n=Math.trunc(Number(s)); if(!isFinite(n)||n<=0) return "";
  const d=new Date(Date.UTC(1899,11,30)+n*86400000);
  return isNaN(d)?"":d.toISOString().slice(0,10);
}
function decodeXml(s){ return String(s).replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&apos;/g,"'").replace(/&#39;/g,"'"); }
function colIndex(ref){ const m=/^([A-Z]+)/.exec(ref); let n=0; for(const ch of m[1]) n=n*26+(ch.charCodeAt(0)-64); return n-1; }

/* ---------- Dependency-free xlsx reader (native DecompressionStream) ---------- */
function readXlsxIndex(buf){
  const dv=new DataView(buf), u8=new Uint8Array(buf), dec=new TextDecoder();
  let eocd=-1;
  for(let i=buf.byteLength-22;i>=0;i--){ if(dv.getUint32(i,true)===0x06054b50){ eocd=i; break; } }
  if(eocd<0) throw new Error("Not a valid .xlsx (no zip end record)");
  const cdOff=dv.getUint32(eocd+16,true), cdCount=dv.getUint16(eocd+10,true);
  const entries={}; let p=cdOff;
  for(let n=0;n<cdCount;n++){
    if(dv.getUint32(p,true)!==0x02014b50) break;
    const method=dv.getUint16(p+10,true), compSize=dv.getUint32(p+20,true);
    const nameLen=dv.getUint16(p+28,true), extraLen=dv.getUint16(p+30,true), cmtLen=dv.getUint16(p+32,true);
    const localOff=dv.getUint32(p+42,true);
    const name=dec.decode(u8.subarray(p+46,p+46+nameLen));
    entries[name]={method,compSize,localOff}; p+=46+nameLen+extraLen+cmtLen;
  }
  async function get(name){
    const e=entries[name]; if(!e) return null;
    const lNameLen=dv.getUint16(e.localOff+26,true), lExtraLen=dv.getUint16(e.localOff+28,true);
    const start=e.localOff+30+lNameLen+lExtraLen;
    const comp=u8.subarray(start,start+e.compSize);
    if(e.method===0) return dec.decode(comp);
    if(e.method===8){
      if(typeof DecompressionStream==="undefined") throw new Error("This browser can't read .xlsx (no DecompressionStream) — use Chrome/Edge or recent Safari.");
      const ab=await new Response(new Blob([comp]).stream().pipeThrough(new DecompressionStream("deflate-raw"))).arrayBuffer();
      return dec.decode(new Uint8Array(ab));
    }
    throw new Error("Unsupported compression in .xlsx (method "+e.method+")");
  }
  return { names:Object.keys(entries), get };
}
function parseShared(xml){
  if(!xml) return []; const out=[];
  for(const m of xml.matchAll(/<si>([\s\S]*?)<\/si>/g)){
    let t=""; for(const tm of m[1].matchAll(/<t[^>]*>([\s\S]*?)<\/t>/g)) t+=tm[1];
    out.push(decodeXml(t));
  }
  return out;
}
function sheetRows(xml, shared){
  const rows=[];
  for(const rm of xml.matchAll(/<row[^>]*>([\s\S]*?)<\/row>/g)){
    const cells={}; let maxc=0;
    for(const cm of rm[1].matchAll(/<c\s+r="([A-Z]+\d+)"([^>]*?)(?:\/>|>([\s\S]*?)<\/c>)/g)){
      const ref=cm[1], attrs=cm[2]||"", inner=cm[3]||"";
      const ci=colIndex(ref); if(ci>maxc) maxc=ci;
      const tm=/t="([^"]+)"/.exec(attrs); const ty=tm?tm[1]:""; let val="";
      if(ty==="inlineStr"){ const im=/<t[^>]*>([\s\S]*?)<\/t>/.exec(inner); val=im?decodeXml(im[1]):""; }
      else { const vm=/<v>([\s\S]*?)<\/v>/.exec(inner); if(vm){ val = ty==="s" ? (shared[parseInt(vm[1],10)]||"") : decodeXml(vm[1]); } }
      cells[ci]=val;
    }
    const arr=[]; for(let i=0;i<=maxc;i++) arr.push(cells[i]!==undefined?cells[i]:"");
    rows.push(arr);
  }
  return rows;
}
/* ---------- Req parser: one tracker per requisition (Hubble export) ----------
   Reads the first sheet by EXACT header name (column order may vary).
   Only rows that (a) belong to THIS site (Branch/Plant) and (b) carry a REQ#
   in Reference 2 become trackers — everything else is procurement backend noise.
   Order # = the requisition # from Reference 2 (stable across req->PO conversion).
   Supplier SO splits into a cost Category (prefix) + Trade. Qty Ordered -> Expected. */
const REQ_COLS = { order:"Order #", ref2:"Reference 2", line:"Line Number",
  desc:"Description", desc2:"Description 2", part:"2Nd Item Number", qty:"Quantity Ordered",
  orderDate:"Order Date", reqDate:"Promised Delivery Date", supplierSO:"Supplier SO",
  buyer:"Buyer #", branch:"Branch/Plant" };
/* Supplier SO carries a cost-category prefix (IND/INC/EQP…) AND the trade word.
   Fuzzy-match the trade (typo-tolerant, first match wins for multi-trade cells);
   unrecognized/blank -> "" (Unassigned, admin sets). */
const TRADE_ALIASES = [["Electrical",["ELECTRICAL","ELECRICAL","EECTRICAL","EELCTRICAL","ELEC"]],
  ["Civil",["CIVIL","CVIL"]],["Install",["INSTALL","INTSALL","INATALL","INSTAL"]],
  ["Commissioning",["COMMISSIONING","COMMISS","COMM"]],["SIS",["SIS"]],["Office",["OFFICE"]],
  ["Maintenance",["MAINTENANCE","MANTAINANCE","MAINTENENCE","MAINT","MECHANICAL","MECHANIC","MECH"]],
  ["Safety",["SAFETY"]],["Survey",["SURVEY","SURV"]],["TLine",["TLINE","T-LINE","T LINE"]]];
function normTrade(s){ const u=String(s||"").replace(/\s+/g," ").toUpperCase().trim(); if(!u) return "";
  let best="",bp=Infinity; for(const [t,al] of TRADE_ALIASES) for(const a of al){ const p=u.indexOf(a); if(p>=0&&p<bp){bp=p;best=t;} } return best; }
function normCategory(s){ const tok=String(s||"").toUpperCase().replace(/[^A-Z].*$/,"");
  if(tok.startsWith("IND")) return "Indirect"; if(tok.startsWith("INC")) return "Incorporated";
  if(tok.startsWith("EQ")||tok.startsWith("EPQ")) return "Equipment"; return ""; }
const _digits=s=>{ const m=String(s==null?"":s).replace(/\D/g,""); return m.replace(/^0+/,"")||m; };
const _reqNum=s=>{ const m=/REQ#?\s*0*(\d+)/i.exec(String(s==null?"":s)); return m?m[1]:""; };
const _isFreight=(part,desc)=>{ const f=x=>String(x||"").trim().toUpperCase()==="FREIGHT"; return f(part)||f(desc); };
/* Site code(s) for THIS environment (from data/sites.json) — drop procurement /
   warehouse / other-site rows by Branch/Plant. Cached after first read; if unknown
   (e.g. no inventory published yet), the site filter is skipped. */
let _siteCodes=null;
async function siteCodes(){
  if(_siteCodes) return _siteCodes;
  try{ const r=await fetch("data/sites.json",{cache:"no-store"}); const a=r.ok?await r.json():[];
    _siteCodes=(Array.isArray(a)?a:[]).map(s=>String(s.code||"").trim()).filter(Boolean); }
  catch(e){ _siteCodes=[]; }
  return _siteCodes;
}
function firstSheetPath(wb, relMap){
  const m=/<sheet\s+[^>]*r:id="([^"]+)"/.exec(wb);
  if(!m) throw new Error("No sheet found in workbook");
  let t=relMap[m[1]]||""; if(t && !t.startsWith("xl/")) t="xl/"+t; return t;
}
function cleanNum(v){ return String(v==null?"":v).trim().replace(/\.0+$/,""); }
async function parseReqXlsx(file){
  const zip=readXlsxIndex(await file.arrayBuffer());
  const wb=await zip.get("xl/workbook.xml");
  const rels=await zip.get("xl/_rels/workbook.xml.rels");
  const shared=parseShared(await zip.get("xl/sharedStrings.xml"));
  const relMap={};
  for(const m of rels.matchAll(/<Relationship\s+[^>]*Id="([^"]+)"[^>]*Target="([^"]+)"/g)) relMap[m[1]]=m[2];
  const rows=sheetRows(await zip.get(firstSheetPath(wb,relMap))||"", shared);
  if(!rows.length) throw new Error("The sheet is empty");
  // Match headers case-insensitively and whitespace-normalized (names are fixed; order may vary).
  const norm=s=>String(s||"").replace(/\s+/g," ").trim().toLowerCase();
  const hdrRaw=rows[0].map(x=>String(x||"").trim());
  const hdrNorm=hdrRaw.map(norm);
  const col=name=>hdrNorm.indexOf(norm(name));
  const iOrder=col(REQ_COLS.order);
  if(iOrder<0) throw new Error('Header "'+REQ_COLS.order+'" not found. Headers: '+(hdrRaw.filter(Boolean).join(", ")||"(none)"));
  const iRef2=col(REQ_COLS.ref2), iLine=col(REQ_COLS.line), iDesc=col(REQ_COLS.desc), iD2=col(REQ_COLS.desc2),
        iPart=col(REQ_COLS.part), iQty=col(REQ_COLS.qty), iRD=col(REQ_COLS.reqDate), iSO=col(REQ_COLS.supplierSO),
        iBuyer=col(REQ_COLS.buyer), iBranch=col(REQ_COLS.branch);
  const codes=await siteCodes();
  const D=row=>_digits(iOrder>=0?row[iOrder]:"");
  const T=row=>iRef2>=0?_reqNum(row[iRef2]):"";
  const siteOk=row=>{ if(!codes.length || iBranch<0) return true; const bp=String(row[iBranch]||"").trim(); return codes.some(c=>bp.startsWith(c)); };
  // Pass 1: PO# -> req# map, learned only from rows carrying a REQ# in Reference 2.
  const d2req=new Map();
  for(let r=1;r<rows.length;r++){ const t=T(rows[r]); if(t){ const d=D(rows[r]); if(d && !d2req.has(d)) d2req.set(d,t); } }
  // Pass 2: which reqs were converted to a PO (a REQ# row whose Order # differs from the req#).
  const converted=new Set();
  for(let r=1;r<rows.length;r++){ const req=T(rows[r]); if(!req) continue; const d=D(rows[r]); if(d && d!==req) converted.add(req); }
  // Pass 3: build one tracker per requisition — this site only, drop backend noise / freight / stale req rows.
  const byOrder=new Map(), tradeBy=new Map(), catBy=new Map(), buyerBy=new Map();
  for(let r=1;r<rows.length;r++){
    const row=rows[r]; const req=T(row);
    if(!req) continue;                                   // no REQ# -> procurement / backend noise
    if(!siteOk(row)) continue;                           // Branch/Plant not this site
    const d=D(row);
    if(converted.has(req) && d===req) continue;          // stale requisition superseded by its PO
    const d1=iDesc>=0?String(row[iDesc]||"").trim():"";
    const d2=iD2>=0?String(row[iD2]||"").trim():"";
    const part=iPart>=0?String(row[iPart]||"").trim():"";
    if(_isFreight(part,d1)) continue;                    // freight / non-material
    const lnRaw=iLine>=0?cleanNum(row[iLine]):"";
    const qRaw=iQty>=0?cleanNum(row[iQty]):"";
    const line={ line: lnRaw!==""?(parseInt(lnRaw,10)||lnRaw):"", part,
      desc:d1+(d2?(" "+d2):""), uom:"",
      requiredDate:iRD>=0?excelSerialToISO(row[iRD]):"",
      expected:(qRaw!=="" && isFinite(Number(qRaw)))?Number(qRaw):null };
    if(!line.desc && !part && line.line==="") continue;
    if(!byOrder.has(req)) byOrder.set(req, []);
    byOrder.get(req).push(line);
    if(!tradeBy.get(req)){ const tr=iSO>=0?normTrade(row[iSO]):""; if(tr) tradeBy.set(req,tr); }
    if(!catBy.get(req)){ const ct=iSO>=0?normCategory(row[iSO]):""; if(ct) catBy.set(req,ct); }
    if(!buyerBy.get(req)){ const bv=iBuyer>=0?String(row[iBuyer]||"").trim():""; if(bv) buyerBy.set(req,bv); }
  }
  const orders=[...byOrder.entries()].map(([reqNumber,lines])=>({reqNumber, trade:tradeBy.get(reqNumber)||"", category:catBy.get(reqNumber)||"", lines, excluded:false, originator:buyerBy.get(reqNumber)||""}));
  orders.sort((a,b)=>String(a.reqNumber).localeCompare(String(b.reqNumber),undefined,{numeric:true}));
  if(!orders.length) throw new Error("No requisition rows found for this site (each tracked row needs a REQ# in Reference 2).");
  return orders;
}

/* ---------- admin (real key wired in Task 4; here it unlocks the UI) ---------- */
function setAdmin(on){
  STATE.admin=on;
  $("#adminBtn").style.display=on?"none":"inline-flex";
  $("#adminWho").style.display=on?"inline":"none";
  $("#adminWho").textContent=on?("Admin: "+STATE.adminName):"";
  if(!on){ $("#newPanel").classList.remove("show"); }
  render();
}
function adminUnlock(){
  const name=prompt("Your name (shown on updates):"); if(name===null) return;
  const key=prompt("Admin key:"); if(key===null) return;
  STATE.adminName=name.trim()||"admin";
  nsSet("bac_admin_name", STATE.adminName);
  nsSet("bac_admin_key", key.trim());
  setAdmin(true);
  toast("Admin unlocked");
}

/* ---------- new trackers (one per order, admin assigns a trade to each) ---------- */
/* Existing trackers (open + closed) — used to skip orders already tracked and to
   backfill newly-mapped fields (e.g. originator) onto trackers created earlier. */
async function fetchExistingTrackers(){
  const all=[];
  for(const st of ["open","closed"]){
    try{ const r=await fetch(wbase()+"/reqs?state="+st); if(!r.ok) continue;
      const d=await r.json(); (d.trackers||[]).forEach(t=>all.push(t)); }catch(e){}
  }
  return all;
}
function orderExists(o){ return !!(STATE.existingReqs && STATE.existingReqs.has(String(o.reqNumber))); }
/* Existing trackers that match a parsed order carrying an originator the tracker
   is still missing — the "backfill" set. Returns [{issue, trade, requisitioner}]. */
function backfillCandidates(){
  if(!STATE.pendingOrders || !STATE.existingTrackers) return [];
  const origByReq=new Map();
  STATE.pendingOrders.forEach(o=>{ if(o.originator) origByReq.set(String(o.reqNumber), o.originator); });
  const out=[];

function newOrders(){ return (STATE.pendingOrders||[]).filter(o=>!orderExists(o) && !o.excluded); }

  const out=[];

    out.push({ reqNumber:o.reqNumber, trade:o.trade, category:o.category||"", requisitioner:req,
      project:(o.project?o.project+" · ":"")+"Part "+(i+1)+" of "+n,

function lineDelivered(l){ return (l.deliveries||[]).reduce((s,d)=>s+(Number(d.qty)||0),0); }
function linePickedUp(l){ return (l.pickups||[]).reduce((s,p)=>s+(Number(p.qty)||0),0); }
function lineExpected(l){ return (l && l.expected!=null && l.expected!=="") ? Number(l.expected) : null; }
function linePending(l){ const e=lineExpected(l); return e==null ? null : Math.max(0, e - lineDelivered(l)); }
function lineStatus(delivered, picked){
  if(delivered<=0 && picked<=0) return "Not started";
  if(picked>0 && picked>=delivered) return "Picked up";
  if(picked>0) return "Partial pickup";

}
function statusClass(s){ return s==="Picked up"?"st-complete":((s==="On site"||s==="Partial pickup")?"st-onsite":"st-none"); }
function linePickPct(delivered, picked){ if(delivered<=0) return picked>0?100:0; return Math.max(0,Math.min(100,Math.round(100*picked/delivered))); }

  const n=new Date(); const t=new Date(n.getFullYear(),n.getMonth(),n.getDate()); return Math.round((d-t)/86400000); }
function lineOverdue(l){ const du=daysUntil(l.requiredDate); return du!==null && du<0 && lineDelivered(l)<=0; }
function lineDueSoon(l){ const du=daysUntil(l.requiredDate); return du!==null && du>=0 && du<=3 && lineDelivered(l)<=0; }

/* Legacy = old-format tracker created before the 3-event Worker (no part/pickups on its lines). */

      (ov?'<span class="rd-tag">Overdue</span>':(ds?'<span class="rd-tag soon">Due soon</span>':''))+'</td>';
    const expCell='<td>'+(canEditPk
      ? editChip('data-ex="'+t.issue+'|'+esc(l.line)+'"', (e==null?"—":esc(e)), (e==null?"":esc(e)))
      : (e==null?"—":esc(e)))+'</td>';
    const delCell='<td>'+(canEditPk
      ? editChip('data-de="'+t.issue+'|'+esc(l.line)+'" data-cur="'+esc(d)+'"', esc(d), esc(d))
      : esc(d))+'</td>';
    const pendCell='<td'+((pend!=null&&pend>0)?' class="rd-over"':'')+'>'+(pend==null?"—":esc(pend))+'</td>';
    return '<tr><td>'+esc(l.line)+'</td><td>'+esc(l.part||"")+'</td><td>'+esc(l.desc)+'</td><td>'+esc(l.uom)+'</td>'+reqCell+expCell+delCell+pendCell+'<td>'+esc(p)+meter+'</td><td class="meta pickedby">'+pb+'</td><td class="'+statusClass(st)+'">'+st+'</td>'+admin+'</tr>';
  }).join("");
  const adminHead = STATE.admin && STATE.state==="open" ? '<th>Log delivery / pickup</th>' : '';
  const isDone = STATE.state==="closed";
  const overBadge = (!isDone && trackerOverdue(t)) ? ' <span class="badge over">Overdue</span>' : '';
  const doneBadge = isDone ? ' <span class="badge done">Completed</span>' : '';
  const completeBtn = (STATE.admin && !isDone) ? '<button class="btn small secondary" data-complete="'+t.issue+'">Mark complete</button>' : '';
  const orig = trackerOriginator(t);
  const tradeOpts = TRADES.concat(TRADES.includes(t.trade)?[]:[t.trade]).map(tr=>'<option value="'+esc(tr)+'"'+(tr===t.trade?' selected':'')+'>'+esc(tr)+'</option>').join("");
  const tradeCtl = STATE.admin
    ? '<select class="trkTrade" data-issue="'+t.issue+'" aria-label="Trade">'+tradeOpts+'</select>'
    : '<span class="badge">'+esc(t.trade)+'</span>';
  const origMeta = orig ? '<span class="meta orig">By '+esc(orig)+'</span>' : '';
  return '<div class="trk'+(isDone?' done':'')+'" data-issue="'+t.issue+'">'+
    '<div class="top" data-toggle="'+t.issue+'"><span class="req">Req '+esc(t.reqNumber)+'</span> '+tradeCtl+overBadge+doneBadge+' '+
      (t.project?'<span class="meta">'+esc(t.project)+'</span>':'')+origMeta+
      '<span class="prog"><span class="lines">'+t.linesComplete+'/'+t.linesTotal+' picked up</span>'+ringSvg(pct)+'</span>'+completeBtn+'</div>'+
    '<div class="detail"><div class="table-scroll"><table><thead><tr><th>Line</th><th>Part #</th><th>Description</th><th>UoM</th><th>Required</th><th>Expected</th><th>Delivered</th><th>Pending</th><th>Picked up</th><th>Picked up by</th><th>Status</th>'+adminHead+'</tr></thead><tbody>'+rows+'</tbody></table></div>'+
      '<div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">'+
      '<button class="btn small secondary" data-print="'+t.issue+'">Print sheet</button>'+
      (STATE.admin?'<button class="btn small secondary" data-delete="'+t.issue+'">Delete order</button>':'')+
      '</div></div></div>';
}

/* ---------- boot ---------- */
function initTrades(){ const f=$("#fTrade"), sa=$("#setAllTrade");
  TRADES.forEach(t=>{ const o=document.createElement("option");o.value=t;o.textContent=t;f.appendChild(o);
    const o2=document.createElement("option");o2.value=t;o2.textContent=t;sa.appendChild(o2); });
  fillCategoryFilter(); }
function resetNewPanel(){ STATE.pendingOrders=null; STATE.existingReqs=null; $("#reqFile").value=""; $("#setAllTrade").value=""; renderPreview(); }
function bind(){
  $("#adminBtn").addEventListener("click", adminUnlock);
  $("#cancelNew").addEventListener("click", ()=>{ $("#newPanel").classList.remove("show"); resetNewPanel(); });
  $("#reqFile").addEventListener("change", async e=>{
    const f=e.target.files[0]; if(!f) return;
    try{ toast("Reading file…"); STATE.pendingOrders=await parseReqXlsx(f); renderPreview();
      STATE.existingTrackers=await fetchExistingTrackers();
      STATE.existingReqs=new Set(STATE.existingTrackers.map(t=>String(t.reqNumber)));   // flag already-tracked orders
      renderPreview();
      toast("Parsed "+STATE.pendingOrders.length+" order"+(STATE.pendingOrders.length===1?"":"s")); }
    catch(err){ STATE.pendingOrders=null; renderPreview(); banner("Could not read file: "+err.message); }
  });
  $("#setAllTrade").addEventListener("change", e=>{
    const v=e.target.value; if(!v||!STATE.pendingOrders) return;
    STATE.pendingOrders.forEach(o=>{ if(!orderExists(o) && !o.excluded) o.trade=v; }); renderPreview();
  });
  $("#preview").addEventListener("change", e=>{
    const sel=e.target.closest(".ordtrade"); if(!sel||!STATE.pendingOrders) return;
    const i=Number(sel.getAttribute("data-idx")); STATE.pendingOrders[i].trade=sel.value;
    const row=sel.closest(".ordrow"); if(row) row.classList.toggle("ready", TRADES.includes(sel.value));
    updateCreateEnabled();
  });
  $("#preview").addEventListener("click", e=>{
    const ex=e.target.closest("[data-exclude]");
    if(ex){
      const i=Number(ex.getAttribute("data-exclude"));
      if(STATE.pendingOrders && STATE.pendingOrders[i]){ STATE.pendingOrders[i].excluded=!STATE.pendingOrders[i].excluded; renderPreview(); }
      return;
    }
    if(e.target.closest("#expandAll")){
      const btn=e.target.closest("#expandAll");
      const anyClosed=!!$("#preview .ordrow:not(.open)");
      $("#preview").querySelectorAll(".ordrow").forEach(r=>r.classList.toggle("open", anyClosed));
      $("#preview").querySelectorAll(".ord-view[data-view]").forEach(v=>v.textContent=anyClosed?"Hide lines":"View lines");
      btn.textContent=anyClosed?"Collapse all":"Expand all";
      return;
    }
    const v=e.target.closest(".ord-view[data-view]"); if(!v) return;
    const row=v.closest(".ordrow"); if(row){ const open=row.classList.toggle("open"); v.textContent=open?"Hide lines":"View lines"; }
  });
  $("#createBtn").addEventListener("click", async ()=>{
    const orders=newOrders();
    if(!orders.length){ toast("No new orders to create"); return; }
    if(!orders.every(o=>TRADES.includes(o.trade))){ toast("Assign a trade to every new order"); return; }
    $("#createBtn").disabled=true;
    // Large orders exceed GitHub's 65,536-char issue body, so split them into
    // ≤MAX_LINES tracker "chunks". Pace the batch and retry throttled creates.
    // An order is marked tracked only when ALL its chunks succeed, so a re-run
    // resumes any that didn't (GitHub also caps content creation at ~500/hour).
    const jobs=[]; orders.forEach(o=>chunkOrder(o).forEach(payload=>jobs.push({o, payload})));
    let ok=0, fail=0; const created=[]; const orderFail=new Map();
    for(let i=0;i<jobs.length;i++){
      const {o,payload}=jobs[i];
      banner("Creating "+(i+1)+" of "+jobs.length+"…  ("+ok+" done"+(fail?", "+fail+" failed":"")+")");
      let res=null;
      for(let attempt=0; attempt<4; attempt++){
        if(attempt>0) await sleep(3000*Math.pow(2,attempt-1));   // 3s, 6s, 12s backoff on throttle
        res=await createTracker(payload);
        if(res.ok) break;
      }
      if(res && res.ok){ ok++; if(res.tracker) created.push(res.tracker); }
      else { fail++; orderFail.set(o,(orderFail.get(o)||0)+1); }
      if(i < jobs.length-1) await sleep(CREATE_PACE_MS);
    }
    orders.forEach(o=>{ if(!orderFail.get(o) && STATE.existingReqs) STATE.existingReqs.add(String(o.reqNumber)); });
    created.reverse().forEach(tr=>STATE.trackers.unshift(tr));
    invalidateCache();
    STATE.state="open"; STATE.page=1; $("#segActive").setAttribute("aria-selected","true"); $("#segDone").setAttribute("aria-selected","false");
    $("#createBtn").disabled=false;
    if(fail){
      // keep the panel open; fully-created orders now drop off as "already tracked"
      renderPreview();
      banner("Created "+ok+" tracker"+(ok===1?"":"s")+", "+fail+" could not be created. Wait a moment, then click Create again to retry the rest — already-created orders are skipped.");
    } else {
      banner(""); $("#newPanel").classList.remove("show"); resetNewPanel();
    }
    render();
    toast("Created "+ok+" tracker"+(ok===1?"":"s")+(fail?(" · "+fail+" failed"):""));
  });
  $("#backfillBtn").addEventListener("click", async ()=>{
    const cands=backfillCandidates(); if(!cands.length) return;
    if(!window.confirm("Backfill the Buyer onto "+cands.length+" already-tracked order"+(cands.length===1?"":"s")+" from this file?")) return;
    $("#backfillBtn").disabled=true;
    let ok=0, fail=0;
    for(let i=0;i<cands.length;i++){
      const c=cands[i]; banner("Backfilling "+(i+1)+" of "+cands.length+"…  ("+ok+" done"+(fail?", "+fail+" failed":"")+")");
      let done=false;
      for(let attempt=0; attempt<4 && !done; attempt++){
        if(attempt>0) await sleep(3000*Math.pow(2,attempt-1));
        try{ await setTradeReq(c.issue, c.trade, c.requisitioner); done=true; }catch(e){}
      }
      done ? ok++ : fail++;
      if(i < cands.length-1) await sleep(CREATE_PACE_MS);
    }
    STATE.existingTrackers=await fetchExistingTrackers();
    STATE.existingReqs=new Set(STATE.existingTrackers.map(t=>String(t.reqNumber)));
    invalidateCache(); await loadTrackers(true);
    $("#backfillBtn").disabled=false; renderPreview(); render();
    banner(""); toast("Backfilled "+ok+" order"+(ok===1?"":"s")+(fail?(" · "+fail+" failed"):""));
  });
  let qTimer;   // debounce search so we don't re-render the whole (large) list on every keystroke
  $("#q").addEventListener("input", ()=>{ clearTimeout(qTimer); qTimer=setTimeout(()=>{ STATE.page=1; render(); }, 180); });
  $("#fTrade").addEventListener("change", ()=>{ STATE.page=1; render(); });
  $("#fCategory").addEventListener("change", ()=>{ STATE.page=1; render(); });
  $("#fFrom").addEventListener("change", ()=>{ STATE.page=1; render(); });
  $("#fTo").addEventListener("change", ()=>{ STATE.page=1; render(); });
  $("#todayBtn").addEventListener("click", ()=>{
    const d=todayISO(); $("#fFrom").value=d; $("#fTo").value=d;   // exact today via range
    STATE.page=1; render();
  });
  $("#filtersBtn").addEventListener("click", ()=>{
    const fb=$("#filterbar"), open=fb.classList.toggle("show");
    $("#filtersBtn").setAttribute("aria-expanded", open?"true":"false");
  });
  $("#clearFilters").addEventListener("click", ()=>{
    $("#fTrade").value=""; $("#fCategory").value=""; $("#fFrom").value=""; $("#fTo").value="";
    STATE.page=1; render();
  });
  $("#segActive").addEventListener("click", async ()=>{ STATE.state="open"; STATE.page=1; $("#segActive").setAttribute("aria-selected","true"); $("#segDone").setAttribute("aria-selected","false"); await loadTrackers(); render(); });
  $("#segDone").addEventListener("click", async ()=>{ STATE.state="closed"; STATE.page=1; $("#segDone").setAttribute("aria-selected","true"); $("#segActive").setAttribute("aria-selected","false"); await loadTrackers(); render(); });
  $("#pgPrev").addEventListener("click", ()=>{ if(STATE.page>1) gotoPage(STATE.page-1); });
  $("#pgNext").addEventListener("click", ()=>{ gotoPage(STATE.page+1); });
  $("#pgSel").addEventListener("change", e=>{ gotoPage(Number(e.target.value)||1); });
  $("#purgeLegacy").addEventListener("click", async ()=>{
    const legacy=STATE.trackers.filter(isLegacy); if(!legacy.length) return;
    if(!window.confirm("Delete "+legacy.length+" legacy (old-format) tracker"+(legacy.length===1?"":"s")+"? Each GitHub issue is closed as a record.")) return;
    $("#purgeLegacy").disabled=true;
    let ok=0, fail=0;
    for(let i=0;i<legacy.length;i++){ const t=legacy[i]; toast("Purging "+(i+1)+"/"+legacy.length+"…");
      try{ await deleteReq(t.issue); const idx=STATE.trackers.findIndex(x=>x.issue===t.issue); if(idx>=0) STATE.trackers.splice(idx,1); ok++; }
      catch(err){ fail++; }
    }
    $("#purgeLegacy").disabled=false; invalidateCache(); render();
    toast("Purged "+ok+(fail?(" · "+fail+" failed"):""));
  });
  $("#list").addEventListener("change", async e=>{
    const sel=e.target.closest(".trkTrade"); if(!sel) return;
    const issue=parseInt(sel.getAttribute("data-issue"),10), trade=sel.value;
    sel.disabled=true;
    try{ toast("Updating trade…"); const res=await setTradeReq(issue, trade);
      const idx=STATE.trackers.findIndex(t=>t.issue===issue);
      if(idx>=0 && res.tracker) STATE.trackers[idx]=res.tracker;
      invalidateCache(); toast("Trade updated"); render();
    }catch(err){ sel.disabled=false; toast("Failed: "+err.message);
      const idx=STATE.trackers.findIndex(t=>t.issue===issue); if(idx>=0) sel.value=STATE.trackers[idx].trade; }
  });
  $("#list").addEventListener("click", async e=>{
    if(e.target.closest(".trkTrade")) return;   // let the trade editor handle its own clicks (don't toggle)
    // ----- correct a picked-up qty (intentional: Edit -> change -> Save) -----
    const pkEdit=e.target.closest(".pk-edit");
    if(pkEdit){ const pk=pkEdit.closest(".pk"); pk.classList.add("editing"); const q=pk.querySelector(".pk-q"); q.focus(); q.select(); return; }
    const pkCancel=e.target.closest(".pk-cancel");
    if(pkCancel){ pkCancel.closest(".pk").classList.remove("editing"); return; }
    const pkSave=e.target.closest(".pk-save");
    if(pkSave){
      const pk=pkSave.closest(".pk");
      const q=pk.querySelector(".pk-q").value.trim();
      const applyResult=(res, issue, okMsg)=>{
        const i=STATE.trackers.findIndex(t=>t.issue===parseInt(issue,10)); invalidateCache();
        if(res.complete){ if(i>=0) STATE.trackers.splice(i,1); toast("Updated — tracker complete"); render(); }
        else { if(i>=0 && res.tracker) STATE.trackers[i]=res.tracker; toast(okMsg); render();
          const card=document.querySelector('.trk[data-issue="'+issue+'"]'); if(card) card.classList.add("open"); }
      };
      // 1) pickup entry qty
      if(pk.hasAttribute("data-pk")){
        const [issue,line,idx]=pk.getAttribute("data-pk").split("|");
        if(q===""||!isFinite(Number(q))||Number(q)===0){ toast("Enter a corrected quantity"); return; }
        if(!window.confirm("Update this picked-up quantity to "+q+"?")) return;
        try{ toast("Updating…"); applyResult(await editPickup(parseInt(issue,10), line, parseInt(idx,10), Number(q)), issue, "Pickup qty updated"); }
        catch(err){ toast("Failed: "+err.message); }
        return;
      }
      // 2) expected value (absolute)
      if(pk.hasAttribute("data-ex")){
        const [issue,line]=pk.getAttribute("data-ex").split("|");
        if(q===""||!isFinite(Number(q))||Number(q)<0){ toast("Enter a valid expected quantity"); return; }
        if(!window.confirm("Set Expected to "+q+"?")) return;
        try{ toast("Updating…"); applyResult(await editExpected(parseInt(issue,10), line, Number(q)), issue, "Expected updated"); }
        catch(err){ toast("Failed: "+err.message); }
        return;
      }
      // 3) delivered total (applied as the adjusting difference)
      if(pk.hasAttribute("data-de")){
        const [issue,line]=pk.getAttribute("data-de").split("|");
        const cur=Number(pk.getAttribute("data-cur")||"0");
        if(q===""||!isFinite(Number(q))||Number(q)<0){ toast("Enter a valid delivered quantity"); return; }
        const target=Number(q), delta=target-cur;
        if(delta===0){ pk.classList.remove("editing"); return; }
        if(!window.confirm("Set Delivered to "+target+"?")) return;
        try{ toast("Updating…"); applyResult(await adjustDelivered(parseInt(issue,10), line, delta), issue, "Delivered updated"); }
        catch(err){ toast("Failed: "+err.message); }
        return;
      }
      return;
    }
    const cmp=e.target.closest("[data-complete]");
    if(cmp){
      const issue=parseInt(cmp.getAttribute("data-complete"),10);
      if(!window.confirm("Mark this order complete? It moves to the Completed tab.")) return;
      try{ toast("Completing…"); await completeReq(issue);
        const idx=STATE.trackers.findIndex(t=>t.issue===issue); if(idx>=0) STATE.trackers.splice(idx,1);
        invalidateCache(); toast("Order marked complete"); render();
      }catch(err){ toast("Failed: "+err.message); }
      return;
    }
    const del=e.target.closest("[data-delete]");
    if(del){
      const issue=parseInt(del.getAttribute("data-delete"),10);
      if(!window.confirm("Delete this tracker? It's removed from the app (the GitHub issue is closed as a record).")) return;
      try{ toast("Deleting…"); await deleteReq(issue);
        const idx=STATE.trackers.findIndex(t=>t.issue===issue); if(idx>=0) STATE.trackers.splice(idx,1);
        invalidateCache(); toast("Tracker deleted"); render();
      }catch(err){ toast("Delete failed: "+err.message); }
      return;
    }
    const delLine=e.target.closest("[data-delline]");
    if(delLine){
      const [issueStr,line]=delLine.getAttribute("data-delline").split("|");
      const issue=parseInt(issueStr,10);
      const t=STATE.trackers.find(x=>x.issue===issue);
      const lineCount=(t&&t.marker&&t.marker.lines||[]).length;
      if(lineCount<=1){ toast("This is the only line — use Delete order instead."); return; }
      if(!window.confirm("Remove line "+line+" from this order? This can't be undone.")) return;
      try{ toast("Removing line…"); const res=await deleteLine(issue, line);
        const idx=STATE.trackers.findIndex(x=>x.issue===issue); invalidateCache();
        if(res.complete){ if(idx>=0) STATE.trackers.splice(idx,1); toast("Line removed — tracker complete"); render(); }
        else { if(idx>=0 && res.tracker) STATE.trackers[idx]=res.tracker; toast("Line removed"); render();
          const card=document.querySelector('.trk[data-issue="'+issue+'"]'); if(card) card.classList.add("open"); }
      }catch(err){ toast("Remove failed: "+err.message); }
      return;
    }
    const prt=e.target.closest("[data-print]");
    if(prt){
      const issue=parseInt(prt.getAttribute("data-print"),10);
      const t=STATE.trackers.find(x=>x.issue===issue); if(t) printSheet(t);
      return;
    }
    const ev=e.target.closest("[data-ev]");
    if(ev){
      const [kind,issue,line]=ev.getAttribute("data-ev").split("|");
      const row=ev.closest("tr"); let qty, by="";
      if(kind==="pickup"){
        qty=row.querySelector(".pqty").value.trim(); by=row.querySelector(".pby").value.trim();
        if(!qty||Number(qty)===0){ toast("Enter a pickup quantity"); return; }
        if(!by){ toast("Enter who picked it up"); return; }
      } else if(kind==="expected"){
        qty=row.querySelector(".exqty").value.trim();
        if(qty===""||!isFinite(Number(qty))||Number(qty)<0){ toast("Enter an expected quantity"); return; }
      } else {
        qty=row.querySelector(".dqty").value.trim();
        if(!qty||Number(qty)===0){ toast("Enter a delivered quantity"); return; }
      }
      try{
        toast("Logging…");
        const res=await logEvent(parseInt(issue,10), line, kind, qty, by);
        const idx=STATE.trackers.findIndex(t=>t.issue===parseInt(issue,10));
        invalidateCache();
        if(res.complete){ if(idx>=0) STATE.trackers.splice(idx,1); toast("Logged — tracker complete"); render(); }
        else { if(idx>=0 && res.tracker) STATE.trackers[idx]=res.tracker; toast(kind==="pickup"?"Pickup logged":(kind==="expected"?"Expected qty set":"Delivery logged")); render();
          const card=document.querySelector('.trk[data-issue="'+issue+'"]'); if(card) card.classList.add("open"); }
      }catch(err){ toast("Failed: "+err.message); }
      return;
    }
    const tog=e.target.closest("[data-toggle]");
    if(tog){ tog.closest(".trk").classList.toggle("open"); }
  });
}
async function init(){
  initTrades(); bind();
  STATE.adminName=nsGet("bac_admin_name")||"";
  if(nsGet("bac_admin_key")) setAdmin(true);   // stay logged in on this device (shared with the hub)
  if(STATE.admin && new URLSearchParams(location.search).get("admin")==="new"){ $("#newPanel").classList.add("show"); }
  const dq=new URLSearchParams(location.search).get("q"); if(dq){ $("#q").value=dq; }   // deep-link from Dashboard search
  await loadTrackers();
  render();
}
init();
</script>
<script>
/* Optional view-only gate. Public unless data/access.json sets a view key.
   Admins (bac_admin_key present) are exempt. Deterrent only — repo is public. */
(function(){
  var D=document.documentElement;
  function reveal(){ D.classList.remove("acc-wait"); }
  try{ if(nsGet("bac_admin_key")){ reveal(); return; } }catch(e){ reveal(); return; }
  async function sha(s){ var b=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
    return Array.prototype.map.call(new Uint8Array(b), function(x){return x.toString(16).padStart(2,"0");}).join(""); }
  fetch("data/access.json",{cache:"no-store"}).then(function(r){return r.ok?r.json():{view:null};})
    .catch(function(){return {view:null};})
    .then(async function(cfg){
      var v=cfg&&cfg.view;
      if(!v||!v.salt||!v.hash){ reveal(); return; }
      var stored=""; try{ stored=nsGet("bac_view_key")||""; }catch(e){}
      if(stored && (await sha(v.salt+":"+stored))===v.hash){ reveal(); return; }
      D.classList.remove("acc-wait"); D.classList.add("acc-locked");
      var input=document.getElementById("accInput"), btn=document.getElementById("accBtn"), err=document.getElementById("accErr");
      async function attempt(){
        var k=(input.value||"").trim(); if(!k) return;
        if((await sha(v.salt+":"+k))===v.hash){ try{nsSet("bac_view_key",k);}catch(e){} location.reload(); }
        else { err.textContent="That access key isn't right. Contact your SIS for access."; input.value=""; input.focus(); }
      }
      btn.addEventListener("click", attempt);
      input.addEventListener("keydown", function(e){ if(e.key==="Enter") attempt(); });
      input.focus();
    });
})();
</script>
