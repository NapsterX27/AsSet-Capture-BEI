<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" href="data:,">
<title>Site Inventory Portal | Blattner</title>
<style>
  :root{
    --dark-blue:#02568A; --energy-blue:#2DA2DB; --light-blue:#B9E5FB;
    --bright-gray:#F2F2F2; --light-gray:#BCBCBC; --medium-gray:#76777B;
    --dark-gray:#333333; --white:#FFFFFF; --black:#000000;
    --r:14px; --r-sm:10px; --r-lg:20px;
    --shadow:0 1px 4px #BCBCBC; --shadow-lift:0 10px 24px #BCBCBC;
    --rail-w:88px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{overflow-x:hidden;}
  body{font-family:Arial, Helvetica, sans-serif;color:var(--dark-gray);background:var(--bright-gray);
    line-height:1.5;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
  h1,h2,h3{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;color:var(--dark-blue);line-height:1.05;}
  a{color:var(--energy-blue);}

  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  @keyframes railIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:none;}}

  /* ---------- App shell ---------- */
  .app-shell{display:flex;min-height:100vh;align-items:stretch;}

  .nav-rail{flex:0 0 var(--rail-w);width:var(--rail-w);background:var(--dark-blue);color:var(--white);
    display:flex;flex-direction:column;align-items:stretch;padding:16px 8px 14px;position:sticky;top:0;height:100vh;
    animation:railIn .3s ease both;}
  .rail-logo{display:block;width:46px;height:46px;margin:0 auto 22px;}
  .rail-logo svg{width:100%;height:100%;display:block;}
  .rail-item{display:block;text-align:center;color:var(--light-blue);text-decoration:none;padding:12px 4px;
    border-radius:var(--r-sm);margin-bottom:6px;transition:background .18s ease,color .18s ease,transform .18s ease;}
  .rail-item:hover{background:var(--energy-blue);color:var(--white);transform:translateY(-2px);}
  .rail-item.active{background:var(--white);color:var(--dark-blue);}
  .rail-ic{width:20px;height:20px;margin:0 auto 7px;position:relative;display:block;}
  .ic-hub::before{content:"";position:absolute;left:0;top:0;width:8px;height:8px;border-radius:2px;background:currentColor;
    box-shadow:12px 0 0 currentColor,0 12px 0 currentColor,12px 12px 0 currentColor;}
  .ic-assets::before{content:"";position:absolute;left:0;top:2px;width:20px;height:3px;border-radius:2px;background:currentColor;
    box-shadow:0 7px 0 currentColor,0 14px 0 currentColor;}
  .ic-deliv::before{content:"";box-sizing:border-box;position:absolute;left:1px;top:1px;width:18px;height:18px;border:2px solid currentColor;border-radius:3px;}
  .ic-deliv::after{content:"";box-sizing:border-box;position:absolute;left:6px;top:5px;width:6px;height:10px;border:2px solid currentColor;
    border-top:none;border-left:none;transform:rotate(45deg);}
  .ic-admin::before{content:"";box-sizing:border-box;position:absolute;left:5px;top:1px;width:10px;height:8px;border:2px solid currentColor;border-bottom:none;border-radius:5px 5px 0 0;}
  .ic-admin::after{content:"";box-sizing:border-box;position:absolute;left:3px;top:8px;width:14px;height:11px;background:currentColor;border-radius:2px;}
  .rail-lbl{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:9px;letter-spacing:0.04em;display:block;}
  .rail-foot{margin-top:auto;text-align:center;font-family:'Arial Black', Arial, sans-serif;font-size:10px;
    letter-spacing:0.12em;color:var(--energy-blue);padding-top:12px;}

  .app-body{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;}

  /* ---------- Top bar ---------- */
  .topbar{background:var(--dark-blue);color:var(--white);padding:20px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .topbar h1{color:var(--white);font-size:22px;letter-spacing:0.01em;}
  .topbar .tb-sub{font-size:11px;text-transform:uppercase;letter-spacing:0.10em;color:var(--light-blue);font-weight:bold;margin-top:3px;}
  .topbar .spacer{flex:1;}
  .topbar .asof{display:none;align-items:center;gap:9px;flex:0 0 auto;border:1px solid var(--energy-blue);border-radius:999px;padding:7px 14px;}
  .topbar .asof.show{display:inline-flex;}
  .topbar .asof .dot{width:7px;height:7px;border-radius:50%;background:var(--energy-blue);flex:0 0 7px;}
  .topbar .asof .lbl2{font-size:9px;text-transform:uppercase;letter-spacing:0.09em;color:var(--light-blue);font-weight:bold;}
  .topbar .asof .val{font-size:11px;color:var(--white);font-weight:bold;}

  main{max-width:1160px;width:100%;margin:0 auto;padding:32px 32px 56px;}
  .intro{margin-bottom:22px;animation:fadeUp .4s ease both;}
  .intro h2{font-size:24px;margin-bottom:6px;}
  .intro .rule{width:64px;height:4px;background:var(--energy-blue);margin:10px 0 14px;border-radius:2px;}
  .intro p{color:var(--medium-gray);max-width:640px;}

  /* ---------- App cards ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:22px;}
  .card{background:var(--white);border:1px solid var(--light-gray);border-radius:var(--r);overflow:hidden;
    display:flex;flex-direction:column;min-height:210px;box-shadow:var(--shadow);
    transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;animation:fadeUp .5s ease both;}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lift);border-color:var(--energy-blue);}
  .card .accent-top{height:5px;background:var(--energy-blue);}
  .card.soon .accent-top{background:var(--light-gray);}
  .card .body{padding:22px 22px 8px;flex:1;}
  .card .chip{width:44px;height:44px;border-radius:12px;background:var(--light-blue);position:relative;margin-bottom:14px;}
  .card .chip::before{content:"";position:absolute;left:12px;top:14px;width:20px;height:3px;border-radius:2px;background:var(--dark-blue);
    box-shadow:0 6px 0 var(--dark-blue),0 12px 0 var(--dark-blue);}
  .card.proc .chip::before{content:"";box-sizing:border-box;left:12px;top:12px;width:20px;height:20px;border:3px solid var(--dark-blue);border-radius:4px;background:none;box-shadow:none;}
  .card.proc .chip::after{content:"";box-sizing:border-box;position:absolute;left:18px;top:16px;width:7px;height:12px;border:3px solid var(--dark-blue);
    border-top:none;border-left:none;transform:rotate(45deg);}
  .card .eyebrow{font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:0.10em;color:var(--medium-gray);margin-bottom:6px;}
  .card h3{font-size:19px;color:var(--dark-blue);margin-bottom:10px;}
  .card p{font-size:14px;color:var(--medium-gray);}
  .card .foot{padding:14px 22px 22px;}
  .open-btn{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:12px;letter-spacing:0.04em;
    padding:11px 20px;border:1px solid var(--dark-blue);background:var(--dark-blue);color:var(--white);border-radius:var(--r-sm);
    text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:background .18s ease,border-color .18s ease,gap .18s ease;}
  .open-btn::after{content:"\2192";}
  .open-btn:hover{background:var(--energy-blue);border-color:var(--energy-blue);gap:12px;}
  .card.soon h3{color:var(--medium-gray);}
  .card.soon .chip{background:var(--bright-gray);}
  .card.soon .chip::before{background:var(--light-gray);box-shadow:0 6px 0 var(--light-gray),0 12px 0 var(--light-gray);}
  .soon-tag{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:11px;letter-spacing:0.04em;
    color:var(--medium-gray);border:1px solid var(--light-gray);border-radius:var(--r-sm);padding:11px 16px;display:inline-block;}

  /* KPI tiles */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;}
  .kpi{background:var(--white);border:1px solid var(--light-gray);border-radius:var(--r);padding:16px 18px;
    box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;animation:fadeUp .45s ease both;}
  .kpi .grow{flex:1;min-width:0;}
  .kpi .lbl{font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:0.09em;color:var(--medium-gray);}
  .kpi .num{font-family:'Arial Black', Arial, sans-serif;color:var(--dark-blue);font-size:28px;line-height:1;margin:4px 0 8px;}
  .kpi .sub{font-size:11px;color:var(--medium-gray);}
  .meter{height:6px;background:var(--bright-gray);border-radius:3px;overflow:hidden;}
  .meter>span{display:block;height:100%;background:var(--energy-blue);border-radius:3px;width:0;transition:width .9s ease;}
  .meter.blue>span{background:var(--dark-blue);} .meter.light>span{background:var(--light-blue);}
  .ring-wrap{position:relative;width:58px;height:58px;flex:0 0 58px;}
  .ring-wrap .ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Arial Black', Arial, sans-serif;font-size:13px;color:var(--dark-blue);}
  svg.chart.ring{width:58px;height:58px;display:block;}
  .ring-fg{transition:stroke-dashoffset 1s ease;}

  footer{max-width:1160px;width:100%;margin:0 auto;padding:0 32px 40px;color:var(--medium-gray);font-size:11px;}

  /* ---------- Responsive ---------- */
  @media (max-width:820px){
    :root{--rail-w:100%;}
    .app-shell{flex-direction:column;}
    .nav-rail{flex-direction:row;height:auto;position:static;padding:8px;align-items:center;gap:6px;}
    .rail-logo{margin:0 8px 0 4px;width:38px;height:38px;flex:0 0 38px;}
    .rail-item{flex:1;margin-bottom:0;padding:8px 4px;}
    .rail-ic{width:18px;height:18px;margin:0 auto 4px;}
    .rail-foot{display:none;}
  }
  @media (max-width:560px){
    .topbar{padding:16px 16px;} main{padding:22px 16px 48px;} footer{padding:0 16px 32px;}
    .topbar h1{font-size:18px;}
  }
</style>
</head>

<script>
"use strict";
/* ============================================================
   EDIT HERE to add a feature: add an object to APPS.
   status: "live"  -> card links to `href`
           "soon"  -> card shows "Coming soon" (no link)
   kind: "inv" (inventory chip) | "proc" (procurement chip)
   ============================================================ */
const APPS = [
  {
    eyebrow: "Inventory",
    title: "Asset Inventory",
    desc: "Review the Equipment Master by site, search by unit or serial, and submit trade-reassignment or issue requests.",
    href: "inventory.html",
    status: "live",
    kind: "inv"
  },
  {
    eyebrow: "Procurement",
    title: "Deliveries",
    desc: "Track Reqs delivered by trade. Updated daily.",
    href: "deliveries.html",
    status: "live",
    kind: "proc"
  }
  // Add future features here, e.g.:
  // { eyebrow:"Field", title:"My Tool", desc:"…", href:"mytool.html", status:"live", kind:"inv" }
];

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
const $ = s => document.querySelector(s);

function render(){
  document.getElementById("grid").innerHTML = APPS.map((a,i) => {
    const foot = a.status === "live"
      ? '<a class="open-btn" href="' + esc(a.href) + '">Open</a>'
      : '<span class="soon-tag">Coming soon</span>';
    const cls = "card" + (a.status === "live" ? "" : " soon") + (a.kind === "proc" ? " proc" : "");
    return '<div class="' + cls + '" style="animation-delay:' + (0.06 * i) + 's">' +
      '<div class="accent-top"></div>' +
      '<div class="body">' +
        '<div class="chip" aria-hidden="true"></div>' +
        '<div class="eyebrow">' + esc(a.eyebrow) + '</div>' +
        '<h3>' + esc(a.title) + '</h3>' +
        '<p>' + esc(a.desc) + '</p>' +
      '</div>' +
      '<div class="foot">' + foot + '</div>' +
    '</div>';
  }).join("");
}

/* Last-updated pill (date + time from the build's ISO timestamp). */
function fmtUpdated(iso){
  if(!iso) return "";
  const date=iso.slice(0,10), time=iso.slice(11,16);
  return '<span class="dot"></span><span><span class="lbl2">Last updated</span><br>' +
    '<span class="val">' + esc(date) + (time?(' &middot; ' + esc(time) + ' UTC'):'') + '</span></span>';
}

/* ---------- Dashboard KPIs ----------
   Assets/status come from the static data/ files; open requests + active
   deliveries come from the repo's public GitHub Issues API (read-only, no
   token, CORS-enabled) — so no Worker call is needed here. */
const GH_ISSUES = "https://api.github.com/repos/be-apps-tools/1127/issues?state=open&per_page=100";
function labelsOf(it){ return (it.labels||[]).map(l => typeof l==="string" ? l : (l&&l.name)||""); }
async function fetchOpenIssues(){
  const r = await fetch(GH_ISSUES, { headers:{ "Accept":"application/vnd.github+json" } });
  if(!r.ok) throw new Error("GitHub "+r.status);
  const a = await r.json();
  return Array.isArray(a) ? a.filter(it => !it.pull_request) : [];
}
function ringSvg(pct){
  const p=Math.max(0,Math.min(100,pct||0));
  return '<div class="ring-wrap"><svg class="chart ring" viewBox="0 0 48 48" aria-hidden="true">'+
    '<circle cx="24" cy="24" r="20" fill="none" stroke="#B9E5FB" stroke-width="5"></circle>'+
    '<circle class="ring-fg" cx="24" cy="24" r="20" fill="none" stroke="#2DA2DB" stroke-width="5" stroke-linecap="round" '+
      'stroke-dasharray="125.66" stroke-dashoffset="125.66" data-pct="'+p+'" transform="rotate(-90 24 24)"></circle>'+
    '</svg><div class="ring-val">'+p+'%</div></div>';
}
function meterTile(lbl, num, cls, pct){
  return '<div class="kpi"><div class="grow"><div class="lbl">'+esc(lbl)+'</div><div class="num">'+esc(num)+'</div>'+
    '<div class="meter '+cls+'"><span data-w="'+(pct||0)+'"></span></div></div></div>';
}
function subTile(lbl, num, sub){
  return '<div class="kpi"><div class="grow"><div class="lbl">'+esc(lbl)+'</div><div class="num">'+esc(num)+'</div>'+
    (sub?'<div class="sub">'+esc(sub)+'</div>':'')+'</div></div>';
}
async function loadDashboard(){
  let meta=null, sites=[];
  try{ const r=await fetch("data/meta.json"); if(r.ok) meta=await r.json(); }catch(e){}
  try{ const r=await fetch("data/sites.json"); if(r.ok) sites=await r.json(); }catch(e){}
  if(meta && meta.builtAt){ const el=$("#asof"); el.innerHTML=fmtUpdated(meta.builtAt); el.classList.add("show"); }

  let total=0, working=0, attention=0, unassigned=0;
  try{
    const per=await Promise.all((sites||[]).map(s=>fetch("data/sites/"+encodeURIComponent(s.code)+".json").then(r=>r.ok?r.json():[]).catch(()=>[])));
    per.forEach(as=>(as||[]).forEach(a=>{
      total++; const st=String(a.status||"");
      if(st.indexOf("WK")===0) working++;
      else if(st.indexOf("AV")!==0 && st.indexOf("AC")!==0) attention++;
      if(!String(a.trade||"")) unassigned++;
    }));
  }catch(e){}
  if(!total && meta && meta.assetCount) total=meta.assetCount;

  let openReq=null, activeDeliv=null;
  try{
    const arr=await fetchOpenIssues(); openReq=0; activeDeliv=0;
    arr.forEach(it=>{ const L=labelsOf(it);
      if(L.includes("req-tracker")) activeDeliv++;
      else if(L.includes("request:reassign")||L.includes("request:issue")) openReq++;
    });
  }catch(e){ /* offline / rate-limited: show em-dash */ }

  const pct = total ? Math.round(100*working/total) : 0;
  const pctOf = v => total ? Math.round(100*v/total) : 0;
  const box=$("#kpis");
  box.innerHTML =
    '<div class="kpi">'+ringSvg(pct)+'<div class="grow"><div class="lbl">Working</div><div class="num">'+working.toLocaleString()+'</div><div class="sub">of '+total.toLocaleString()+' assets</div></div></div>'+
    subTile("Assets tracked", total.toLocaleString(), (meta&&meta.sourceVersion)?("Master "+meta.sourceVersion):"")+
    meterTile("Needs attention", attention.toLocaleString(), "blue", pctOf(attention))+
    meterTile("Unassigned trade", unassigned.toLocaleString(), "light", pctOf(unassigned))+
    subTile("Open requests", (openReq==null?"—":String(openReq)), "Trade / issue")+
    subTile("Active deliveries", (activeDeliv==null?"—":String(activeDeliv)), "In progress");
  requestAnimationFrame(()=>{
    box.querySelectorAll(".meter>span").forEach(el=>el.style.width=(Number(el.getAttribute("data-w"))||0)+"%");
    const fg=box.querySelector(".ring-fg"); if(fg) fg.style.strokeDashoffset=(125.66*(1-pct/100)).toFixed(1);
  });
}

render();
loadDashboard();
</script>
</body>
