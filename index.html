<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Asset Management | Blattner</title>
<style>
  :root{
    --dark-blue:#02568A; --energy-blue:#2DA2DB; --light-blue:#B9E5FB;
    --bright-gray:#F2F2F2; --light-gray:#BCBCBC; --medium-gray:#76777B;
    --dark-gray:#333333; --white:#FFFFFF; --black:#000000;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{overflow-x:hidden;}
  body{font-family:Arial, Helvetica, sans-serif;color:var(--dark-gray);background:var(--bright-gray);
    line-height:1.5;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;}
  h1,h2,h3{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;color:var(--dark-blue);line-height:1.05;}

  .brand-header{background:var(--dark-blue);color:var(--white);padding:16px 32px;display:flex;align-items:center;gap:16px;}
  .brand-header .logo{width:46px;height:46px;flex:0 0 46px;display:flex;align-items:center;justify-content:center;}
  .brand-header .logo svg{width:100%;height:100%;display:block;}
  .brand-header h1{color:var(--white);font-size:20px;letter-spacing:0.01em;}
  .brand-header .sub{font-size:11px;text-transform:uppercase;letter-spacing:0.10em;color:var(--light-blue);font-weight:bold;}

  main{max-width:1100px;margin:0 auto;padding:36px 32px 64px;}
  .intro{margin-bottom:28px;}
  .intro h2{font-size:24px;margin-bottom:6px;}
  .intro .rule{width:64px;height:4px;background:var(--energy-blue);margin:10px 0 14px;}
  .intro p{color:var(--dark-gray);max-width:640px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px;}
  .card{background:var(--white);border:1px solid var(--light-gray);border-top:4px solid var(--energy-blue);
    display:flex;flex-direction:column;min-height:190px;}
  .card .body{padding:22px 22px 8px;flex:1;}
  .card .eyebrow{font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:0.10em;color:var(--medium-gray);margin-bottom:8px;}
  .card h3{font-size:18px;color:var(--dark-blue);margin-bottom:10px;}
  .card p{font-size:14px;color:var(--dark-gray);}
  .card .foot{padding:14px 22px 20px;}
  .open-btn{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:12px;letter-spacing:0.04em;
    padding:11px 18px;border:1px solid var(--dark-blue);background:var(--dark-blue);color:var(--white);
    text-decoration:none;display:inline-block;}
  .open-btn:hover{background:var(--energy-blue);border-color:var(--energy-blue);}
  .card.soon{border-top-color:var(--light-gray);}
  .card.soon h3{color:var(--medium-gray);}
  .soon-tag{font-family:'Arial Black', Arial, sans-serif;text-transform:uppercase;font-size:11px;letter-spacing:0.04em;
    color:var(--medium-gray);border:1px solid var(--light-gray);padding:10px 16px;display:inline-block;}

  footer{max-width:1100px;margin:0 auto;padding:0 32px 40px;color:var(--medium-gray);font-size:11px;}

  @media (max-width:560px){ .brand-header{padding:14px 16px;} main{padding:24px 16px 48px;} }
</style>
</head>
<body>

<header class="brand-header">
  <div class="logo" aria-hidden="true"><svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
	 viewBox="0 0 400 400" style="enable-background:new 0 0 400 400;" xml:space="preserve">
<style type="text/css">
	.st0{fill:#FFFFFF;}
</style>
<g>
	<polygon class="st0" points="215.2,164.1 231.7,122.3 195,122.3 	"/>
	<path class="st0" d="M233.4,200l0.1,0.2c0,0,0-0.1,0.1-0.1L233.4,200z"/>
	<path class="st0" d="M233.5,200.2l20.7,24.4c7.9-3.4,13.5-8.4,17.7-15.1l-38.4-9.5C233.6,200.1,233.5,200.2,233.5,200.2"/>
	<path class="st0" d="M278.4,128.5l-38.3,42.9l-4.3,4.8l4.9-0.2l43.1-1.6l-45.3,13.9l0,0l-0.4,0.1l0.3,0.2h0l33.6,20.9
		c4.2-6.6,7-14.8,9.5-24.9l2.7-11C289.4,152.7,289.2,136.7,278.4,128.5"/>
	<polygon class="st0" points="202.5,163.7 195,122.3 167.4,122.3 	"/>
	<path class="st0" d="M254.5,122.3h-22.8l-4.3,43.1l-0.2,1.7l2.1-1.6l49-37C273.1,124.5,265.4,122.3,254.5,122.3"/>
	<path class="st0" d="M209.6,206.5H116l8.1-33h77.5l-43-50.7H83.8L31.8,334.1h168.4c30.3,0,55.3-9.6,66.4-56
		c6.5-27.1,1.1-43.5-19.3-50.5l-22.9-27.1C220.8,204.7,215.8,206.5,209.6,206.5 M214.8,267.8c-3,12.3-11.4,15.5-22.9,15.5H97.2
		l8.1-33h94.8C211.5,250.3,218.3,253.5,214.8,267.8"/>

</g>
</svg></div>
  <div>
    <h1>Asset Management</h1>
    <div class="sub">Blattner &middot; BEI</div>
  </div>
</header>

<main>
  <div class="intro">
    <h2>Tools</h2>
    <div class="rule"></div>
    <p>Select a tool below. New tools are added as cards as they come online.</p>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer>&copy; 2026 Blattner. Internal tools.</footer>

<script>
"use strict";
/* ============================================================
   EDIT HERE to add a feature: add an object to APPS.
   status: "live"  -> card links to `href`
           "soon"  -> card shows "Coming soon" (no link)
   ============================================================ */
const APPS = [
  {
    eyebrow: "Inventory",
    title: "Asset Inventory",
    desc: "Review the Equipment Master by site, search by unit or serial, and submit trade-reassignment or issue requests.",
    href: "inventory.html",
    status: "live"
  },
  {
    eyebrow: "Field",
    title: "Photo Capture",
    desc: "Capture new asset records with photos in the field and export to CSV. (Placeholder card — wire up when ready.)",
    href: "capture.html",
    status: "soon"
  }
];

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

function render(){
  document.getElementById("grid").innerHTML = APPS.map(a => {
    const foot = a.status === "live"
      ? '<a class="open-btn" href="' + esc(a.href) + '">Open</a>'
      : '<span class="soon-tag">Coming soon</span>';
    return '<div class="card' + (a.status === "live" ? "" : " soon") + '">' +
      '<div class="body">' +
        '<div class="eyebrow">' + esc(a.eyebrow) + '</div>' +
        '<h3>' + esc(a.title) + '</h3>' +
        '<p>' + esc(a.desc) + '</p>' +
      '</div>' +
      '<div class="foot">' + foot + '</div>' +
    '</div>';
  }).join("");
}
render();
</script>
</body>
</html>
